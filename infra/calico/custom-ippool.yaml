---
# Custom IPPool para Calico - CIDR: 10.0.0.0/16
# 
# Evita colisión con la red del host (VirtualBox: 192.168.0.0/24)
# Este archivo es una referencia documentativa de la configuración activa.
# La configuración real persiste en etcd a través de la Installation CR de Tigera Operator.
#
# Cambio de CIDR (cuando sea necesario):
# kubectl patch installation default --type='json' \
#   -p='[{"op": "replace", "path": "/spec/calicoNetwork/ipPools/0/cidr", "value":"10.0.0.0/16"}]'
#
apiVersion: projectcalico.org/v3
kind: IPPool
metadata:
  name: default-ipv4-ippool
spec:
  cidr: 10.0.0.0/16
  blockSize: 26
  ipipMode: Never
  natOutgoing: true
  nodeSelector: all()
  vxlanMode: CrossSubnet
  allowedUses:
  - Workload
  - Tunnel
  assignmentMode: Automatic
