---
# Custom IPPool para Calico - CIDR: 10.0.0.0/16
# Evita colisión con la red del host 192.168.0.0/24
apiVersion: projectcalico.org/v3
kind: IPPool
metadata:
  name: default-ipv4-ippool
spec:
  cidr: 10.0.0.0/16
  blockSize: 26
  ipipMode: Never
  natOutgoing: true
  nodeSelector: all()
  vxlanMode: CrossSubnet
  allowedUses:
  - Workload
  - Tunnel
  assignmentMode: Automatic
