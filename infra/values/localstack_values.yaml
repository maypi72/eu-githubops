# LocalStack Helm Chart Values
# Chart: localstack/localstack
# Para más opciones, ver: https://github.com/localstack/helm-charts

image:
  repository: localstack/localstack
  tag: "latest"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  ports:
    edge: 4566
  annotations: {}

# Recursos
resources:
  limits:
    cpu: "1"
    memory: "1Gi"
  requests:
    cpu: "500m"
    memory: "512Mi"

# Configuración de LocalStack
startServices: "s3"

# Persistencia de datos
persistence:
  enabled: true
  size: 5Gi
  storageClassName: null  # Usar storage class por defecto del cluster

# Variables de entorno para LocalStack
extraEnvVars:
  - name: DEBUG
    value: "1"
  - name: LOCALSTACK_AUTH_TOKEN
    value: ""  # Community version
  - name: AWS_ACCESS_KEY_ID
    valueFrom:
      secretKeyRef:
        name: localstack-aws-credentials
        key: AWS_ACCESS_KEY_ID
  - name: AWS_SECRET_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: localstack-aws-credentials
        key: AWS_SECRET_ACCESS_KEY
  - name: AWS_REGION
    valueFrom:
      secretKeyRef:
        name: localstack-aws-credentials
        key: AWS_REGION

# Probes de health
livenessProbe:
  httpGet:
    path: /_localstack/health
    port: 4566
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /_localstack/health
    port: 4566
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 3

# Logs
log:
  level: debug

# Afinidad y selectores de nodo
nodeSelector: {}
affinity: {}
tolerations: []

# SecurityContext
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Ingress Configuration
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
  hosts:
    - host: localstack.local
      paths:
        - path: /
          pathType: Prefix

# Labels y annotations
labels:
  app: localstack
  version: v1

annotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "4566"