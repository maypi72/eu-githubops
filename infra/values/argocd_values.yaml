# Argo CD v3.3.6 | Helm chart 9.5.0
global:
  domain: argocd.local

configs:
  cm:
    url: https://argocd.local
    admin.enabled: true

  # Esta es la sección clave para deshabilitar TLS internamente
  params:
    server.insecure: "true"
    repo.server.plaintext: "true"

dex:
  enabled: false

redis:
  enabled: true

controller:
  replicas: 1
  resources:
    requests: { cpu: 150m, memory: 250Mi }
    limits: { cpu: 500m, memory: 760Mi }
  # Forzamos al controller a usar plaintext para evitar el ComparisonError
  env:
    - name: ARGOCD_REPO_SERVER_PLAINTEXT
      value: "true"
  extraArgs:
    - --repo-server-plaintext

server:
  replicas: 1
  service:
    type: ClusterIP
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: mygitops-ca
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    hosts:
      - argocd.local
    paths:
      - /
    pathType: Prefix
    tls:
      - secretName: argocd-tls
        hosts:
          - argocd.local

repoServer:
  replicas: 1
  resources:
    requests: { cpu: 300m, memory: 256Mi }
    limits: { cpu: 1000m, memory: 512Mi }
  
  # Simplificado: el flag correcto es --disable-tls
  extraArgs:
    - --disable-tls
    - --enable-helm

  # Sondas corregidas al puerto 8081 (donde escucha el servicio gRPC sin TLS)
  livenessProbe:
    httpGet:
      path: /healthz?full=true
      port: 8081
    initialDelaySeconds: 30
    timeoutSeconds: 10
  readinessProbe:
    httpGet:
      path: /healthz
      port: 8081
    initialDelaySeconds: 30
    timeoutSeconds: 10

applicationSet:
  replicas: 1
  extraArgs:
    - --repo-server-plaintext

notifications:
  enabled: false
