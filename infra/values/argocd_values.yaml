# Argo CD v3.3.6 (Bleeding Edge)
# Helm chart 9.5.0
# Escenario: TLS Termination en Ingress (Cert-Manager) y comunicación interna HTTP

global:
  domain: argocd.local

configs:
  cm:
    url: https://argocd.local
    admin.enabled: true
    application.instanceLabelKey: argocd.argoproj.io/instance
    applicationSetController.enable.progressive.syncs: "true"

  params:
    reposerver.disable.tls: "true"
    repo.server.plaintext: "true"
    server.insecure: "true"

dex:
  enabled: false

redis:
  enabled: true

controller:
  replicas: 1
  resources:
    requests: { cpu: 150m, memory: 250Mi }
    limits: { cpu: 500m, memory: 760Mi }

server:
  replicas: 1
  service:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: mygitops-ca
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    hosts:
      - argocd.local
    paths:
      - /
    pathType: Prefix
    tls:
      - secretName: argocd-tls
        hosts:
          - argocd.local

repoServer:
  replicas: 1
  resources:
    requests: { cpu: 300m, memory: 256Mi }
    limits: { cpu: 1000m, memory: 512Mi }

  # Forzar que el repo-server escuche en todas las interfaces y exponer puertos esperados
  extraArgs:
    - --address=0.0.0.0
    - --port=8081
    - --metrics-address=0.0.0.0
    - --metrics-port=8084

  # Probes alineadas con gRPC: comprobación TCP sobre el puerto gRPC 8081
  livenessProbe:
    tcpSocket:
      port: 8081
    initialDelaySeconds: 60
    timeoutSeconds: 5
    periodSeconds: 15
    failureThreshold: 6

  readinessProbe:
    tcpSocket:
      port: 8081
    initialDelaySeconds: 30
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 3

  # Alternativa (más precisa): exec probe usando grpc_health_probe
  # Requiere incluir el binario grpc_health_probe en la imagen o montarlo en el contenedor.
  # Descomenta y ajusta si decides usar exec probe.
  # livenessProbe:
  #   exec:
  #     command:
  #       - /bin/grpc_health_probe
  #       - -addr=:8081
  #       - -rpc-timeout=5s
  #   initialDelaySeconds: 60
  #   timeoutSeconds: 10
  #   periodSeconds: 15
  #   failureThreshold: 6

applicationSet:
  replicas: 1

notifications:
  enabled: false
