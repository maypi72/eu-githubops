# Valores corregidos para ArgoCD v3.3.6 / Helm Chart 9.5.0
# Entorno: K3s + Calico (sin Traefik/Flannel)

global:
  domain: argocd.local

configs:
  cm:
    url: https://argocd.local
    admin.enabled: true
  # IMPORTANTE: Forzamos al repo-server en el puerto gRPC 8081
  params:
    reposerver: "argocd-repo-server:8081"
    server.insecure: true # Ingress ya gestiona TLS (terminación SSL)

configuration:
  params:
    application.instanceLabelKey: argocd.argoproj.io/instance

dex:
  enabled: false

redis:
  enabled: true

controller:
  replicas: 1
  resources:
    requests:
      cpu: 150m
      memory: 250Mi
    limits:
      cpu: 500m
      memory: 760Mi

server:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  service:
    type: ClusterIP
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: "mygitops-ca"
      # Nginx hablará con el pod por HTTP (insecure) y Nginx pondrá el certificado TLS
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    hosts:
      - argocd.local
    paths:
      - /
    pathType: Prefix
    tls:
      - secretName: argocd-tls
        hosts:
          - argocd.local

repoServer:
  replicas: 1
  # El puerto de salud por defecto en esta versión es el 8084
  livenessProbe:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 10
    tcpSocket:
      port: 8081 # Usamos TCP en el puerto gRPC para asegurar conectividad básica
  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    tcpSocket:
      port: 8081
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

applicationSet:
  replicas: 1

notifications:
  enabled: false
