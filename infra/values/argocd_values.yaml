#Argo CD v3.3.6
# Helm chart 9.5.0
# Escenario: TLS Termination en Ingress (Cert-Manager) y comunicación interna HTTP

global:
  domain: argocd.local

configs:
  cm:
    url: https://argocd.local
    admin.enabled: true

  params:
    reposerver.disable.tls: "true"
    repo.server.plaintext: "true"
    server.insecure: "true"

dex:
  enabled: false

redis:
  enabled: true

controller:
  replicas: 1
  resources:
    requests: { cpu: 150m, memory: 250Mi }
    limits: { cpu: 500m, memory: 760Mi }

server:
  replicas: 1
  service:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: mygitops-ca
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    hosts:
      - argocd.local
    paths:
      - /
    pathType: Prefix
    tls:
      - secretName: argocd-tls
        hosts:
          - argocd.local

repoServer:
  replicas: 1
  resources:
    requests: { cpu: 300m, memory: 256Mi }
    limits: { cpu: 1000m, memory: 512Mi }

  extraArgs:
    - --dissable-tls=true

  env:
    - name: ARGOCD_REPO_SERVER_PLAINTEXT
      value: "true"
    - name: ARGOCD_REPO_SERVER_DISABLE_TLS
      value: "true"

  livenessProbe:
    httpGet:
      path: /healthz?full=true
      port: metrics
    initialDelaySeconds: 30
    timeoutSeconds: 10
    periodSeconds: 15
    failureThreshold: 5
  readinessProbe:
    httpGet:
      path: /healthz
      port: metrics
    initialDelaySeconds: 30
    timeoutSeconds: 10
    periodSeconds: 15
    failureThreshold: 5

applicationSet:
  replicas: 1

notifications:
  enabled: false
