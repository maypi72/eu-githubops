# Argo CD v3.3.6 (Bleeding Edge)
# Helm chart 9.5.0
# Escenario: TLS Termination en Ingress (Cert-Manager) y comunicación interna HTTP

global:
  domain: argocd.local

configs:
  cm:
    url: https://argocd.local
    admin.enabled: true
    application.instanceLabelKey: argocd.argoproj.io/instance
    applicationSetController.enable.progressive.syncs: "true"

  # En v3.x, los parámetros se mapean así en el ConfigMap central
  params:
    # Desactiva TLS en el binario repo-server
    reposerver.disable.tls: "true"
    # Indica a los clientes (server/controller) que usen HTTP para conectar al repo-server
    repo.server.plaintext: "true"
    # El servidor API/UI escucha en HTTP puro (para el Ingress)
    server.insecure: "true"

dex:
  enabled: false

redis:
  enabled: true

controller:
  replicas: 1
  resources:
    requests: { cpu: 150m, memory: 250Mi }
    limits: { cpu: 500m, memory: 760Mi }

server:
  replicas: 1
  service:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: mygitops-ca
      # IMPORTANTE: Como server.insecure es "true", el backend es HTTP
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      # Forzar redirección a HTTPS en el navegador
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      # Soporte para gRPC (CLI de Argo CD)
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    hosts:
      - argocd.local
    paths:
      - /
    pathType: Prefix
    tls:
      - secretName: argocd-tls
        hosts:
          - argocd.local

repoServer:
  replicas: 1
  # En v3.3.6, repoServer lee automáticamente de configs.params
  resources:
    requests: { cpu: 300m, memory: 256Mi }
    limits: { cpu: 1000m, memory: 512Mi }

applicationSet:
  replicas: 1

notifications:
  enabled: false
