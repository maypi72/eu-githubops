# Valores orientados a laboratorio en K3s.
# Se prioriza simplicidad y bajo consumo de recursos.

global:
  domain: argocd.local

configs:
  # Permitir que ArgoCD cree el secret inicial
  # Luego se reemplaza con el secreto sellado desde sealed-secrets
  secret:
    createSecret: true
  params:
    server.insecure: true

dex:
  enabled: false

redis:
  enabled: true

controller:
  replicas: 1
  parallelismLimit: 3
  resources:
    requests:
      cpu: 150m
      memory: 250Mi
    limits:
      cpu: 500m
      memory: 760Mi

server:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  service:
    type: ClusterIP
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: "mygitops-ca"
    hosts:
      - argocd.local
    paths:
      - /
    pathType: Prefix
    tls:
      - secretName: argocd-tls
        hosts:
          - argocd.local

repoServer:
  replicas: 1
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

applicationSet:
  replicas: 1

notifications:
  enabled: false