# Argo CD v3.3.6
# Helm chart 9.5.0
# k3s + Calico
# TLS terminado en Ingress (nginx)
# repo-server SIN TLS interno

global:
  domain: argocd.local

configs:
  # argocd-cm
  cm:
    url: https://argocd.local
    admin.enabled: true

  # ESTE ES EL CM CLAVE PARA LOS FLAGS DE ARRANQUE
  # genera argocd-cmd-params-cm
  cmdParams:
    # UI / API sin TLS interno
    server.insecure: "true"

    # FUNDAMENTAL: desactivar TLS interno del repo-server
    reposerver.disable.tls: "true"

    # Opcional pero recomendable
    applicationSetController.enable.progressive.syncs: "true"

configuration:
  params:
    application.instanceLabelKey: argocd.argoproj.io/instance

dex:
  enabled: false

redis:
  enabled: true

controller:
  replicas: 1
  resources:
    requests:
      cpu: 150m
      memory: 250Mi
    limits:
      cpu: 500m
      memory: 760Mi

server:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

  service:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: mygitops-ca
      # nginx habla HTTP con el pod
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    hosts:
      - argocd.local
    paths:
      - /
    pathType: Prefix
    tls:
      - secretName: argocd-tls
        hosts:
          - argocd.local

repoServer:
  replicas: 1
  # el chart 9.5.0 IGNORA repoServer.livenessProbe/readinessProbe
  # dejar los defaults (funcionan cuando TLS está desactivado)

  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

applicationSet:
  replicas: 1

notifications:
  enabled: false