# Valores para ArgoCD v3.3.6 con chart Helm 9.5.0
# Configuración orientada a laboratorio en K3s
# Se prioriza simplicidad y bajo consumo de recursos

global:
  domain: argocd.local

#Configuración principal
configs:
  cm:
    # url canónica ya que tenemos ingress + TLS
    url: https://argocd.local
    admin.enabled: true

# Parámetros específicos del servidor ArgoCD
configuration:
  params:
    #server.insecure: true
    server.disable.auth: false
    application.instanceLabelKey: argocd.argoproj.io/instance

# Deshabilitar componentes innecesarios para laboratorio
dex:
  enabled: false

redis:
  enabled: true

controller:
  replicas: 1
  parallelismLimit: 3
  resources:
    requests:
      cpu: 150m
      memory: 250Mi
    limits:
      cpu: 500m
      memory: 760Mi

server:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  service:
    type: ClusterIP
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: "mygitops-ca"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    hosts:
      - argocd.local
    paths:
      - /
    pathType: Prefix
    tls:
      - secretName: argocd-tls
        hosts:
          - argocd.local

repoServer:
  metrics:
    enabled: false
  livenessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    httpGet:
      path: /healthz
      port: 8080

  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    httpGet:
      path: /readyz
      port: 8080
  replicas: 1
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

applicationSet:
  replicas: 1

notifications:
  enabled: false