# Argo CD v2.10 (Helm chart 9.5.0)
# k3s + Calico + Ingress-Nginx
# Escenario: TLS Termination en Ingress (Cert-Manager) y comunicación interna HTTP

global:
  domain: argocd.local

configs:
  # Configuración general de la UI y comportamiento
  cm:
    url: https://argocd.local
    admin.enabled: true
    application.instanceLabelKey: argocd.argoproj.io/instance
    applicationSetController.enable.progressive.syncs: "true"

  # PARÁMETROS CENTRALIZADOS (Equivalente a variables de entorno)
  params:
    # 1. El servidor (API/UI) escucha en HTTP (puerto 8080)
    server.insecure: "true"
    # 2. Deshabilita TLS en el proceso repo-server (ARGOCD_REPO_SERVER_DISABLE_TLS)
    reposerver.disable.tls: "true"
    # 3. Indica a Controller y Server que hablen con Repo Server por HTTP (puerto 8081)
    repo.server.plaintext: "true"

dex:
  enabled: false

redis:
  enabled: true

controller:
  replicas: 1
  resources:
    requests:
      cpu: 150m
      memory: 250Mi
    limits:
      cpu: 500m
      memory: 760Mi

server:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

  service:
    type: ClusterIP

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: mygitops-ca
      # El Ingress habla HTTP con el Pod de Argo (porque server.insecure: "true")
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      # Forzamos HTTPS en el navegador
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      # Configuración para evitar timeouts en logs o terminal de Argo
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    hosts:
      - argocd.local
    paths:
      - /
    pathType: Prefix
    tls:
      - secretName: argocd-tls
        hosts:
          - argocd.local

repoServer:
  replicas: 1
  # Ya no necesita extraArgs porque lo hereda de configs.params
  resources:
    requests:
      cpu: 300m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

applicationSet:
  replicas: 1

notifications:
  enabled: false
