# Trivy Operator - Configuración Minimalista

operator:
  scanJobsConcurrentLimit: 2
  vulnerabilityScannerScanOnlyCurrentRevisions: true
  configAuditScannerScanOnlyCurrentRevisions: true
  batchDeleteLimit: 3
  batchDeleteDelay: 10s
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

trivy:
  mode: Standalone
  severity: "HIGH,CRITICAL"
  ignoreUnfixed: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 512Mi
  timeout: 5m
  skipDirs: "/proc,/sys,/dev,/var"

scanners:
  vulnerability:
    enabled: true
  configAudit:
    enabled: true
  exposedSecrets:
    enabled: false
  rbacAssessment:
    enabled: false
  infraAssessment:
    enabled: false
  clusterComplianceReport:
    enabled: false

excludeNamespaces: "kube-system,trivy-system,kube-public,kube-node-lease,monitoring,argocd"
nodeCollector:
  enabled: false

serviceMonitor:
  enabled: false

trivyOperator:
  metricsVulnerabilityId: false
  metricsFindingsEnabled: false
