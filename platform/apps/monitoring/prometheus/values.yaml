grafana:
  enabled: false

alertmanager:
  enabled: false

prometheusOperator:
  enabled: true
  admissionWebhooks:
    enabled: true
    timeoutSeconds: 10
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

prometheus:
  enabled: true
  prometheusSpec:
    retention: 15d
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    queryMaxConcurrency: 20
    queryTimeout: 2m
    evaluationInterval: 30s
    scrapeInterval: 30s
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi