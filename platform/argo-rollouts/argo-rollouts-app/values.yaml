installCRDs: true

controller:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 120Mi
    limits:
      cpu: 200m
      memory: 300Mi
  containerRuntime: containerd

dashboard:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 20m
      memory: 60Mi
    limits:
      cpu: 100m
      memory: 150Mi

  service:
    type: ClusterIP
    port: 3100

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: "mygitops-ca"
    hosts:
      - host: rollouts.local.dev
        paths:
          - /
    tls:
      - secretName: rollouts-dashboard-tls
        hosts:
          - rollouts.local.dev
