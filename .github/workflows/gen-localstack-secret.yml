name: Generate LocalStack Secret

on:
  workflow_dispatch:
    inputs:
      fetch_cert:
        description: '📥 Descargar certificado del cluster (si ya existe sealed-secrets)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

env:
  KUBECONFIG: $HOME/kubeconfig
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-localstack-secret:
    name: Generate LocalStack SealedSecret
    runs-on: [self-hosted, linux]
    timeout-minutes: 15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necesario para git operations posteriores
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          echo "::group::Configurando Git"
          git config user.name "gha-runner"
          git config user.email "gha-runner@users.noreply.github.com"
          echo "✓ Git configurado"
          echo "::endgroup::"

      - name: Setup kubeconfig
        id: setup-kubeconfig
        run: |
          echo "::group::Configurando kubeconfig"
          
          KUBECONFIG_FOUND=false
          
          # Buscar kubeconfig en rutas locales primero (desde bootstrap-cluster.yml)
          KUBECONFIG_PATHS=(
            "$KUBECONFIG"
            "/etc/rancher/k3s/k3s.yaml"
            "$HOME/kubeconfig"
            "$HOME/.kube/config"
          )
          
          echo "Buscando KUBECONFIG en rutas locales..."
          for kb_path in "${KUBECONFIG_PATHS[@]}"; do
            if [ -f "$kb_path" ]; then
              echo "[✓] KUBECONFIG encontrado en: $kb_path"
              
              # Copiar a la ruta estándar si está en otro lado
              if [ "$kb_path" != "$KUBECONFIG" ]; then
                echo "  Copiando a: $KUBECONFIG"
                mkdir -p "$(dirname "$KUBECONFIG")"
                cp "$kb_path" "$KUBECONFIG"
                chmod 600 "$KUBECONFIG"
              fi
              
              export KUBECONFIG="$KUBECONFIG"
              echo "KUBECONFIG=$KUBECONFIG" >> $GITHUB_ENV
              
              KUBECONFIG_FOUND=true
              break
            fi
          done
          
          # Si no se encuentra localmente, intentar usar artefacto descargado
          if [ "$KUBECONFIG_FOUND" = false ]; then
            echo "[!] KUBECONFIG no encontrado localmente"
            echo "[!] Intentando descargar desde artifacts del último bootstrap..."
            
            # Descargar kubeconfig del último artefacto disponible
            if ! gh run download -D "$HOME" -n kubeconfig 2>/dev/null; then
              echo "[⚠] No se pudo descargar kubeconfig de los artifacts"
              echo "    Por favor:"
              echo "    1. Ejecuta el workflow 'bootstrap-cluster.yml' para generar nuevo artefacto"
              echo "    2. O asegúrate que k3s está instalado en /etc/rancher/k3s/k3s.yaml"
              echo "    3. O define KUBECONFIG en \$HOME/kubeconfig"
              exit 1
            fi
            
            mkdir -p "$(dirname "$KUBECONFIG")"
            mv kubeconfig "$KUBECONFIG" 2>/dev/null || true
            KUBECONFIG_FOUND=true
          fi
          
          # Verificar que KUBECONFIG es accesible
          if [ -f "$KUBECONFIG" ]; then
            # Asegurar permisos correctos
            chmod 600 "$KUBECONFIG" 2>/dev/null || true
            echo "[✓] KUBECONFIG validado: $(ls -lh $KUBECONFIG | awk '{print $5, $9}')"
            echo "[✓] Conectando al cluster..."
            
            if timeout 10 kubectl cluster-info &>/dev/null; then
              echo "[✓] Conexión al cluster OK"
            else
              echo "[✗] No se puede conectar al cluster"
              echo "    Verifica que:"
              echo "    1. El cluster está activo y accesible"
              echo "    2. sealed-secrets está instalado en kube-system"
              exit 1
            fi
          else
            echo "[✗] ERROR: KUBECONFIG no es accesible en $KUBECONFIG"
            exit 1
          fi
          
          echo "::endgroup::"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Dependencies for Secret Generation
        run: |
          echo "::group::Verificando dependencias para generación de secreto"
          
          tools=("yq" "kubeseal")
          for tool in "${tools[@]}"; do
            if command -v "$tool" >/dev/null 2>&1; then
              version=$($tool --version 2>&1 | head -1 || echo "instalado")
              echo "[✓] $tool: $version"
            else
              echo "[!] $tool no está instalado (se instalará durante el proceso)"
            fi
          done
          
          echo "::endgroup::"

      - name: Verify and Add LocalStack Helm Repository
        continue-on-error: true
        run: |
          echo "::group::Verificando Helm Repository de LocalStack"
          
          LOCALSTACK_REPO="https://localstack.github.io/helm-charts"
          LOCALSTACK_REPO_NAME="localstack"
          
          # Verificar si helm está disponible
          if ! command -v helm >/dev/null 2>&1; then
            echo "[!] helm no está disponible (continuando)"
            echo "::endgroup::"
            exit 0
          fi
          
          echo "[✓] helm está disponible"
          
          # Verificar si el repo ya existe
          if helm repo list 2>/dev/null | grep -q "$LOCALSTACK_REPO_NAME"; then
            echo "[✓] Helm repo '$LOCALSTACK_REPO_NAME' ya existe"
          else
            echo "[i] Agregando helm repo de LocalStack..."
            
            if helm repo add "$LOCALSTACK_REPO_NAME" "$LOCALSTACK_REPO"; then
              echo "[✓] Helm repo '$LOCALSTACK_REPO_NAME' agregado"
              
              # Actualizar índice
              if helm repo update "$LOCALSTACK_REPO_NAME"; then
                echo "[✓] Índice de repos actualizado"
              else
                echo "[!] Advertencia: No se pudo actualizar índice (continuando)"
              fi
            else
              echo "[!] Advertencia: No se pudo agregar helm repo"
              echo "    URL: $LOCALSTACK_REPO"
            fi
          fi
          
          echo "::endgroup::"

      - name: Ensure LocalStack Namespace Exists
        continue-on-error: true
        run: |
          echo "::group::Asegurando que el namespace localstack existe"
          
          # Verificar acceso al cluster
          if kubectl cluster-info &>/dev/null; then
            echo "[✓] Cluster accesible"
            
            # Crear namespace si no existe
            if ! kubectl get namespace localstack &>/dev/null; then
              echo "[i] Creando namespace localstack..."
              if kubectl create namespace localstack 2>&1; then
                echo "[✓] Namespace localstack creado"
              else
                echo "[!] No se pudo crear el namespace (continuando anyway)"
              fi
            else
              echo "[✓] Namespace localstack ya existe"
            fi
          else
            echo "[!] No se puede acceder al cluster desde GitHub Actions"
            echo "    El namespace se creará en el script de generación si es necesario"
          fi
          
          echo "::endgroup::"

      - name: Generate LocalStack Sealed Secret
        id: generate-secret
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          FETCH_CERT: ${{ inputs.fetch_cert }}
        run: |
          echo "::group::Generando secreto sellado de LocalStack"
          
          # Mostrar configuración
          echo "[i] Configuración:"
          echo "    FETCH_CERT: $FETCH_CERT"
          echo ""
          
          # Verificar que las credenciales están configuradas
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "[✗] ERROR: AWS_ACCESS_KEY_ID no está definida en GitHub Secrets"
            echo "    Agrega el secret en: Settings > Secrets and variables > Actions"
            exit 1
          fi
          echo "[✓] AWS_ACCESS_KEY_ID está configurada"
          
          if [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "[✗] ERROR: AWS_SECRET_ACCESS_KEY no está definida en GitHub Secrets"
            echo "    Agrega el secret en: Settings > Secrets and variables > Actions"
            exit 1
          fi
          echo "[✓] AWS_SECRET_ACCESS_KEY está configurada"
          
          # Verificar que el script existe
          if [ ! -f "scripts/gen_localstack_secret.sh" ]; then
            echo "[✗] ERROR: scripts/gen_localstack_secret.sh no encontrado"
            exit 1
          fi
          echo "[✓] Script de generación encontrado"
          
          # Hacer el script ejecutable
          chmod +x scripts/gen_localstack_secret.sh
          echo "[✓] Permisos ejecutables otorgados"
          
          # Ejecutar el script
          echo ""
          echo "Ejecutando generación de secreto..."
          if AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
             AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
             bash scripts/gen_localstack_secret.sh; then
            echo "[✓] Secreto sellado generado exitosamente"
            echo "secret_generated=true" >> $GITHUB_OUTPUT
          else
            echo "[✗] Error generando el secreto"
            exit 1
          fi
          
          # Verificar que el archivo se generó
          SEALED_SECRET_FILE="infra/localstack/sealed-secrets/localstack-credentials.yaml"
          if [ ! -f "$SEALED_SECRET_FILE" ]; then
            echo "[✗] ERROR: El archivo de secreto no fue generado: $SEALED_SECRET_FILE"
            exit 1
          fi
          echo "[✓] Archivo generado: $SEALED_SECRET_FILE"
          
          # Validar que el YAML es válido
          if yq eval '.' "$SEALED_SECRET_FILE" > /dev/null 2>&1; then
            echo "[✓] Formato YAML válido"
          else
            echo "[✗] ERROR: El archivo YAML no es válido"
            yq eval '.' "$SEALED_SECRET_FILE"
            exit 1
          fi
          
          # Validar estructura del SealedSecret
          if ! yq eval '.apiVersion' "$SEALED_SECRET_FILE" 2>/dev/null | grep -q "bitnami.com"; then
            echo "[✗] ERROR: apiVersion no es válida para SealedSecret"
            echo "Contenido del archivo:"
            cat "$SEALED_SECRET_FILE"
            exit 1
          fi
          echo "[✓] apiVersion válido"
          
          if ! yq eval '.kind' "$SEALED_SECRET_FILE" 2>/dev/null | grep -q "SealedSecret"; then
            echo "[✗] ERROR: kind debe ser SealedSecret"
            echo "Kind encontrado: $(yq eval '.kind' "$SEALED_SECRET_FILE")"
            exit 1
          fi
          echo "[✓] kind válido: SealedSecret"
          
          echo "[✓] Estructura de SealedSecret validada"
          echo "[✓] Secreto listo para aplicar"
          
          echo "::endgroup::"

      - name: Verify Certificate Status
        if: always()
        run: |
          echo "::group::Verificando estado del certificado"
          
          CERT_PATH="infra/sealed-secrets/pub-cert.pem"
          
          if [ -f "$CERT_PATH" ]; then
            echo "✓ Certificado disponible en: $CERT_PATH"
            echo ""
            
            # Verificar si es auto-firmado (temporal)
            if openssl x509 -in "$CERT_PATH" -noout -subject 2>/dev/null | grep -q "sealed-secrets-temp"; then
              echo "⚠️  INFORMACIÓN: Usando certificado auto-firmado TEMPORAL"
              echo ""
              echo "Razón: Sealed-Secrets no está instalado en el cluster o no es accesible"
              echo ""
              echo "📋 Próximos pasos:"
              echo "  1. Ejecutar 'bootstrap-cluster.yml' para instalar sealed-secrets"
              echo "  2. Una vez instalado, re-ejecutar gen-localstack-secret.yml con:"
              echo "     • fetch_cert = true"
              echo "     Para obtener el certificado del cluster"
              echo ""
              echo "⚠️  Mientras tanto, el secreto está sellado con certificado temporal"
            else
              # Obtener información del certificado
              ISSUER=$(openssl x509 -in "$CERT_PATH" -noout -issuer 2>/dev/null | cut -d' ' -f2-)
              SUBJECT=$(openssl x509 -in "$CERT_PATH" -noout -subject 2>/dev/null | cut -d' ' -f2-)
              EXPIRY=$(openssl x509 -in "$CERT_PATH" -noout -enddate 2>/dev/null | cut -d'=' -f2)
              
              echo "✓ Certificado válido (desde cluster)"
              echo "  • Issuer: $ISSUER"
              echo "  • Subject: $SUBJECT"
              echo "  • Expira: $EXPIRY"
            fi
          else
            echo "⚠️  Certificado no encontrado"
          fi
          
          echo "::endgroup::"

      - name: Verify Changes
        if: success() && steps.generate-secret.outputs.secret_generated == 'true'
        run: |
          echo "::group::Verificando cambios"
          
          # Verificar que el archivo se generó
          SEALED_SECRET_FILE="infra/localstack/sealed-secrets/localstack-credentials.yaml"
          if [ -f "$SEALED_SECRET_FILE" ]; then
            echo "✓ SealedSecret generado: $SEALED_SECRET_FILE"
            
            # Mostrar información del archivo
            echo ""
            echo "Información del Secret:"
            
            # Extraer información de forma más robusta
            if yq eval '.' "$SEALED_SECRET_FILE" > /dev/null 2>&1; then
              echo "✓ YAML válido"
              
              SECRET_NAME=$(yq eval '.metadata.name' "$SEALED_SECRET_FILE" 2>/dev/null || echo "unknown")
              NAMESPACE=$(yq eval '.metadata.namespace' "$SEALED_SECRET_FILE" 2>/dev/null || echo "unknown")
              
              echo "  • Nombre: $SECRET_NAME"
              echo "  • Namespace: $NAMESPACE"
            else
              echo "[!] No se pudo parsear el YAML del SealedSecret"
              echo "    Contenido del archivo:"
              head -10 "$SEALED_SECRET_FILE"
            fi
          else
            echo "[!] Advertencia: SealedSecret no encontrado"
          fi
          
          # El commit y push ya fueron realizados por el script
          echo "[i] Commit y push realizados por el script"
          
          echo "::endgroup::"

      - name: Verify Deployment Readiness
        if: success()
        run: |
          echo "::group::Verificando disponibilidad del SealedSecret"
          
          SEALED_SECRET_FILE="infra/localstack/sealed-secrets/localstack-credentials.yaml"
          
          if [ -f "$SEALED_SECRET_FILE" ]; then
            echo "✓ SealedSecret generado correctamente"
            echo ""
            echo "📋 Información del Secret:"
            
            # Extraer información del SealedSecret
            SECRET_NAME=$(yq eval '.metadata.name' "$SEALED_SECRET_FILE" 2>/dev/null)
            NAMESPACE=$(yq eval '.metadata.namespace' "$SEALED_SECRET_FILE" 2>/dev/null)
            
            echo "  • Nombre: $SECRET_NAME"
            echo "  • Namespace: $NAMESPACE"
            echo ""
            echo "✓ El secreto está listo para ser usado por LocalStack"
            echo ""
            echo "📝 Próximos pasos:"
            echo "  1. El archivo fue subido a git automáticamente"
            echo "  2. ArgoCD sincronizará el SealedSecret al cluster"
            echo "  3. Sealed-Secrets lo desellará automáticamente"
            echo ""
          else
            echo "[!] SealedSecret no disponible"
          fi
          
          echo "::endgroup::"

      - name: Success Summary
        if: success()
        run: |
          echo "::group::✓ Resumen de Éxito"
          echo ""
          echo "============================================"
          echo "LocalStack SealedSecret Generado Exitosamente"
          echo "============================================"
          echo ""
          echo "📁 Ubicación: infra/localstack/sealed-secrets/localstack-credentials.yaml"
          echo ""
          echo "✓ El secret ha sido:"
          echo "  • Creado con las credenciales AWS"
          echo "  • Sellado con kubeseal"
          echo "  • Validado como YAML correcto"
          echo "  • Subido a git automáticamente"
          echo ""
          echo "✓ El cluster está listo para:"
          echo "  • Sincronizar el SealedSecret vía ArgoCD"
          echo "  • Desellarlo automáticamente con sealed-secrets"
          echo "  • Usar las credenciales en LocalStack"
          echo ""
          echo "============================================"
          echo "::endgroup::"

      - name: Failure Diagnostics
        if: failure()
        run: |
          echo "::group::Diagnóstico de Errores"
          echo ""
          echo "Si el error está relacionado con kubeseal:"
          echo "  1. Verifica que sealed-secrets está instalado:"
          echo "     kubectl get pods -n kube-system | grep sealed-secrets"
          echo ""
          echo "  2. O intenta con certificado del cluster:"
          echo "     • Re-ejecuta el workflow con fetch_cert = true"
          echo ""
          echo "Si el error está relacionado con credenciales:"
          echo "  1. Verifica que existen en GitHub Secrets:"
          echo "     • AWS_ACCESS_KEY_ID"
          echo "     • AWS_SECRET_ACCESS_KEY"
          echo ""
          echo "Si el error está relacionado con git:"
          echo "  1. Verifica que el repositorio tiene permisos de escritura"
          echo "  2. O ejecuta manualmente:"
          echo "     git add infra/localstack/sealed-secrets/"
          echo "     git commit -m 'chore: update localstack secret'"
          echo "     git push origin HEAD"
          echo ""
          echo "::endgroup::"
