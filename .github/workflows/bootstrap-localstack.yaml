name: Bootstrap LocalStack

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: 'AWS Region'
        required: true
        default: 'eu-west-1'
        type: string
      auto_apply:
        description: '🚀 Aplicar Terraform automáticamente'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

env:
  KUBECONFIG: ${{ github.workspace }}/kubeconfig
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bootstrap-localstack:
    name: Install LocalStack with AWS S3
    runs-on: [self-hosted, linux]
    timeout-minutes: 30
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          echo "::group::Configurando Git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "✓ Git configurado"
          echo "::endgroup::"

      - name: Setup kubeconfig
        id: setup-kubeconfig
        run: |
          echo "::group::Configurando kubeconfig"
          
          KUBECONFIG_FOUND=false
          
          # Buscar kubeconfig en rutas locales
          KUBECONFIG_PATHS=(
            "$KUBECONFIG"
            "/etc/rancher/k3s/k3s.yaml"
            "$HOME/kubeconfig"
            "$HOME/.kube/config"
          )
          
          echo "Buscando KUBECONFIG en rutas locales..."
          for kb_path in "${KUBECONFIG_PATHS[@]}"; do
            if [ -f "$kb_path" ]; then
              echo "[✓] KUBECONFIG encontrado en: $kb_path"
              
              # Copiar a la ruta estándar si está en otro lado
              if [ "$kb_path" != "$KUBECONFIG" ]; then
                echo "  Copiando a: $KUBECONFIG"
                mkdir -p "$(dirname "$KUBECONFIG")"
                cp "$kb_path" "$KUBECONFIG"
                chmod 600 "$KUBECONFIG"
              fi
              
              export KUBECONFIG="$KUBECONFIG"
              echo "KUBECONFIG=$KUBECONFIG" >> $GITHUB_ENV
              
              KUBECONFIG_FOUND=true
              break
            fi
          done
          
          if [ "$KUBECONFIG_FOUND" = false ]; then
            echo "[✗] KUBECONFIG no encontrado"
            echo "[!] Por favor ejecuta bootstrap-cluster.yml primero"
            exit 1
          fi
          
          # Verificar que KUBECONFIG es accesible
          if [ -f "$KUBECONFIG" ]; then
            chmod 600 "$KUBECONFIG" 2>/dev/null || true
            echo "[✓] KUBECONFIG accesible"
          else
            echo "[✗] Error: KUBECONFIG no es accesible"
            exit 1
          fi
          
          echo "::endgroup::"

      - name: Verify Kubernetes Connectivity
        run: |
          echo "::group::Verificando conectividad con Kubernetes"
          
          if ! kubectl cluster-info; then
            echo "[✗] No se puede conectar al cluster"
            exit 1
          fi
          
          if ! kubectl get nodes; then
            echo "[✗] No se pueden obtener los nodos del cluster"
            exit 1
          fi
          
          echo "[✓] Conectividad verificada"
          echo "::endgroup::"

      - name: Verify Sealed Secrets Installation
        run: |
          echo "::group::Verificando Sealed Secrets"
          
          if kubectl get deployment -n kube-system sealed-secrets 2>/dev/null; then
            echo "[✓] Sealed Secrets está instalado"
            kubectl get deployment -n kube-system sealed-secrets
          else
            echo "[✗] Sealed Secrets no está instalado"
            echo "Por favor ejecuta bootstrap_sealed_secrets.sh primero"
            exit 1
          fi
          
          echo "::endgroup::"

      - name: Verify Ingress Controller
        run: |
          echo "::group::Verificando controlador de Ingress"
          
          if kubectl get deployment -n ingress-nginx nginx-ingress-ingress-nginx-controller 2>/dev/null; then
            echo "[✓] Controlador de Ingress NGINX está instalado"
          else
            echo "[!] Advertencia: Controlador de Ingress no encontrado"
            echo "    Por favor ejecuta bootstrap_ingress.sh primero"
          fi
          
          echo "::endgroup::"

      - name: Make bootstrap script executable
        run: |
          chmod +x ./infra/bootstrap/bootstrap_localstack.sh
          echo "[✓] Script de bootstrap hecho ejecutable"

      - name: Run LocalStack Bootstrap
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ inputs.aws_region }}
          AUTO_APPLY: ${{ inputs.auto_apply }}
          CI: 'true'
        run: |
          ./infra/bootstrap/bootstrap_localstack.sh

      - name: Verify LocalStack Installation
        run: |
          echo "::group::Verificando instalación de LocalStack"
          
          NAMESPACE="localstack"
          
          # Esperar a que el namespace esté disponible
          if ! kubectl get namespace "$NAMESPACE" &>/dev/null; then
            echo "[✗] Namespace '$NAMESPACE' no existe"
            exit 1
          fi
          
          # Verificar pods
          echo "[i] Pods en namespace '$NAMESPACE':"
          kubectl get pods -n "$NAMESPACE"
          
          # Verificar servicios
          echo "[i] Servicios en namespace '$NAMESPACE':"
          kubectl get svc -n "$NAMESPACE"
          
          # Verificar ingress
          echo "[i] Ingress en namespace '$NAMESPACE':"
          kubectl get ingress -n "$NAMESPACE"
          
          # Verificar secret sellado
          echo "[i] Secrets en namespace '$NAMESPACE':"
          kubectl get secrets -n "$NAMESPACE"
          
          echo "[✓] Instalación verificada"
          echo "::endgroup::"

      - name: Upload Sealed Secret
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: localstack-sealed-secrets
          path: infra/localstack/sealed-secrets/
          if-no-files-found: warn
          retention-days: 30

      - name: Generate Terraform Report
        if: always()
        run: |
          echo "::group::Reporte de Terraform"
          
          if [ -f "infra/terraform/localstak/tfplan" ]; then
            echo "[✓] Plan de Terraform generado"
            echo ""
            echo "Para aplicar el plan, ejecuta:"
            echo "  cd infra/terraform/localstak"
            echo "  terraform apply tfplan"
          fi
          
          echo "::endgroup::"

      - name: Commit Sealed Secrets
        if: success()
        run: |
          echo "::group::Committeando cambios"
          
          if [ -f "infra/localstack/sealed-secrets/localstack-aws-credentials.yaml" ]; then
            git add infra/localstack/sealed-secrets/
            
            if git diff --cached --quiet; then
              echo "[i] Sin cambios para commitear"
            else
              git commit -m "chore: Add LocalStack sealed secrets

- AWS credentials sealed with sealed-secrets
- Generated by workflow: ${{ github.workflow }}"
              
              if [ "${{ github.ref }}" == "refs/heads/main" ] || [ "${{ github.ref }}" == "refs/heads/develop" ]; then
                git push origin HEAD:${{ github.ref_name }}
                echo "[✓] Cambios pusheados correctamente"
              else
                echo "[!] No se pushean cambios en branch: ${{ github.ref_name }}"
              fi
            fi
          fi
          
          echo "::endgroup::"

      - name: Summary
        if: success()
        run: |
          echo "## ✅ LocalStack Bootstrap Completado"
          echo ""
          echo "### Recursos Creados:"
          echo "- ✓ Namespace: \`localstack\`"
          echo "- ✓ Release Helm: \`localstack\`"
          echo "- ✓ Secret sellado: \`localstack-aws-credentials\`"
          echo "- ✓ Ingress: \`localstack.local\`"
          echo "- ✓ Plan Terraform: generado en \`infra/terraform/localstak/tfplan\`"
          echo ""
          echo "### Próximos Pasos:"
          echo "1. Verificar status: \`kubectl -n localstack get all\`"
          echo "2. Aplicar Terraform: \`cd infra/terraform/localstak && terraform apply tfplan\`"
          echo "3. Crear buckets S3: \`aws s3 mb s3://mi-bucket --endpoint-url=http://localstack.local\`"
          echo ""
          echo "### Documentación:"
          echo "- [LocalStack Docs](https://docs.localstack.cloud/)"
          echo "- [Terraform AWS Provider](https://registry.terraform.io/providers/hashicorp/aws/latest/docs)"

      - name: Report Failure
        if: failure()
        run: |
          echo "## ❌ Error en LocalStack Bootstrap"
          echo ""
          echo "### Diagnóstico:"
          echo "- Verificar logs de Kubernetes: \`kubectl -n localstack logs -l app=localstack\`"
          echo "- Verificar estado del cluster: \`kubectl get nodes\`"
          echo "- Verificar Sealed Secrets: \`kubectl -n kube-system get pods -l app=sealed-secrets\`"
          echo "- Verificar Ingress: \`kubectl -n ingress-nginx get pods\`"
          echo ""
          echo "Por favor revisa los logs anteriores para más detalles."
          exit 1
