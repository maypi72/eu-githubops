name: Bootstrap Cluster

on:
  workflow_dispatch:
    inputs:
      k3s_version:
        description: 'Versión de k3s'
        required: false
        default: 'v1.30.0+k3s1'
        type: string
      dry_run:
        description: 'Ejecutar en modo dry-run (sin cambios)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write
  actions: write  


env:
  KUBECONFIG: $HOME/kubeconfig
  RETRY_MAX: 5
  RETRY_DELAY: 2
  ARTIFACT_DIR: $HOME/bootstrap-artifacts
  POD_WAIT_TIMEOUT: 15m     # Timeout máximo para que todos los pods estén running
  INGRESS_WAIT_TIMEOUT: 10m # Timeout máximo para que el ingress esté running

jobs:
  bootstrap:
    name: Bootstrap Cluster
    runs-on: [self-hosted, linux]
    timeout-minutes: 60  # Aumentado a 60 minutos para soportar bootstrap + esperas de pods (15m + 10m)
    environment: lab  # Requiere aprobación/protecciones configuradas en GitHub
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate and Prepare Bootstrap Scripts
        run: |
          echo "::group::Validación y preparación de scripts"
          echo "Verificando existencia y permisos de scripts..."
          
          required_files=(
            "infra/bootstrap/bootstrap_k3s.sh"
            "infra/bootstrap/bootstrap_helm.sh"
            "infra/bootstrap/bootstrap_ingress.sh"
            "infra/bootstrap/bootstrap_all.sh"
          )
          
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ $file encontrado"
              
              # Verificar si es ejecutable
              if [ -x "$file" ]; then
                echo "  ✓ Permisos: ejecutable"
              else
                echo "  ⚠ Permisos: NO ejecutable, corrigiendo..."
                chmod +x "$file"
                echo "  ✓ Permisos: ejecutable (actualizado)"
              fi
            else
              echo "✗ ERROR: $file no encontrado"
              exit 1
            fi
          done
          
          echo ""
          echo "✓ Todos los scripts de bootstrap validados y listos"
          echo "::endgroup::"

      - name: System Information
        run: |
          echo "::group::Información del sistema"
          echo "OS: $(uname -s)"
          echo "Kernel: $(uname -r)"
          echo "Arquitectura: $(uname -m)"
          echo "Memoria: $(free -h | grep Mem)"
          echo "Disco: $(df -h / | tail -1)"
          echo "::endgroup::"

      - name: Check Prerequisites
        run: |
          echo "::group::Verificación de herramientas"
          
          tools=("docker" "curl" "jq")
          for tool in "${tools[@]}"; do
            if command -v "$tool" >/dev/null 2>&1; then
              version=$($tool --version 2>&1 | head -1)
              echo "✓ $tool: $version"
            else
              echo "⚠ $tool no está instalado (podría ser necesario)"
            fi
          done
          
          echo "::endgroup::"

      - name: Setup Bootstrap Environment
        run: |
          echo "::group::Configuración del entorno"
          
          export K3S_VERSION=${{ inputs.k3s_version }}
          echo "K3S_VERSION=$K3S_VERSION" >> $GITHUB_ENV
          
          echo "✓ KUBECONFIG configurado en: $KUBECONFIG"
          echo "✓ Retry máximo: $RETRY_MAX"
          echo "✓ Delay de retry: $RETRY_DELAY segundos"
          
          echo "::endgroup::"

      - name: Execute Bootstrap
        id: bootstrap
        run: |
          echo "::group::Ejecutando Bootstrap"
          
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "⚠ MODO DRY-RUN: Scripts no serán ejecutados"
            echo "DRY_RUN=true" >> $GITHUB_ENV
          else
            echo "Iniciando bootstrap del cluster..."
            bash infra/bootstrap/bootstrap_all.sh
            bootstrap_exit=$?
            
            if [ $bootstrap_exit -eq 0 ]; then
              echo "✓ Bootstrap completado exitosamente"
            else
              echo "✗ Bootstrap falló con código $bootstrap_exit"
              exit $bootstrap_exit
            fi
          fi
          
          echo "::endgroup::"

      - name: Verify Bootstrap Installation
        if: success() && env.DRY_RUN != 'true'
        run: |
          echo "::group::Verificación de instalaciones"
          
          # Verificar k3s
          if command -v k3s >/dev/null 2>&1; then
            k3s --version
          fi
          
          # Verificar kubectl
          if command -v kubectl >/dev/null 2>&1; then
            echo "kubectl version:"
            kubectl version --client --short || true
            
            echo ""
            echo "Nodos del cluster:"
            kubectl get nodes || true
          fi
          
          # Verificar Helm
          if command -v helm >/dev/null 2>&1; then
            echo "Helm version:"
            helm version --short || true
            
            echo ""
            echo "Releases instalados:"
            helm list --all-namespaces || true
          fi
          
          echo "::endgroup::"

      - name: Wait for All Pods to be Running
        if: success() && env.DRY_RUN != 'true'
        run: |
          echo "::group::Esperando a que todos los pods estén running (máximo $POD_WAIT_TIMEOUT)"
          
          TIMEOUT_SECONDS=$((15 * 60))  # 15 minutos
          ELAPSED=0
          CHECK_INTERVAL=10
          
          while [ $ELAPSED -lt $TIMEOUT_SECONDS ]; do
            # Contar pods en estado Running
            RUNNING_PODS=$(kubectl get pods --all-namespaces --field-selector=status.phase=Running --no-headers 2>/dev/null | wc -l)
            
            # Contar pods NO en estado Running (excluyendo Succeeded)
            NOT_RUNNING=$(kubectl get pods --all-namespaces --field-selector=status.phase!=Running,status.phase!=Succeeded --no-headers 2>/dev/null | wc -l)
            
            echo "✓ Pods Running: $RUNNING_PODS | Pods en otros estados: $NOT_RUNNING | Tiempo: ${ELAPSED}s"
            
            if [ $NOT_RUNNING -eq 0 ]; then
              echo "✓ ¡Todos los pods están en estado Running o Succeeded!"
              echo "::endgroup::"
              exit 0
            fi
            
            sleep $CHECK_INTERVAL
            ELAPSED=$((ELAPSED + CHECK_INTERVAL))
          done
          
          echo "✗ TIMEOUT: No todos los pods llegaron a estado Running después de $POD_WAIT_TIMEOUT"
          echo ""
          echo "Pods aún pendientes:"
          kubectl get pods --all-namespaces --field-selector=status.phase!=Running,status.phase!=Succeeded || true
          
          echo "::endgroup::"
          exit 1

      - name: Wait for Ingress Controller to be Running
        if: success() && env.DRY_RUN != 'true'
        run: |
          echo "::group::Esperando al Ingress Controller (máximo $INGRESS_WAIT_TIMEOUT)"
          
          TIMEOUT_SECONDS=$((10 * 60))  # 10 minutos
          ELAPSED=0
          CHECK_INTERVAL=5
          
          while [ $ELAPSED -lt $TIMEOUT_SECONDS ]; do
            # Verificar que el pod del ingress-nginx-controller está Running
            INGRESS_STATUS=$(kubectl get pods -n ingress-nginx -l app.kubernetes.io/name=ingress-nginx,app.kubernetes.io/component=controller \
              --field-selector=status.phase=Running --no-headers 2>/dev/null | wc -l)
            
            echo "✓ Ingress Controller Pods Running: $INGRESS_STATUS | Tiempo: ${ELAPSED}s"
            
            if [ $INGRESS_STATUS -gt 0 ]; then
              echo "✓ ¡Ingress Controller está listo!"
              kubectl get pods -n ingress-nginx -l app.kubernetes.io/name=ingress-nginx,app.kubernetes.io/component=controller || true
              echo "::endgroup::"
              exit 0
            fi
            
            sleep $CHECK_INTERVAL
            ELAPSED=$((ELAPSED + CHECK_INTERVAL))
          done
          
          echo "✗ TIMEOUT: Ingress Controller no llegó a estado Running después de $INGRESS_WAIT_TIMEOUT"
          echo ""
          echo "Estado del Ingress:"
          kubectl get pods -n ingress-nginx || true
          
          echo "::endgroup::"
          exit 1

      - name: Secure kubeconfig from k3s
        if: success() && env.DRY_RUN != 'true'
        run: |
          echo "::group::Asegurando kubeconfig de k3s"
          
          K3S_KUBECONFIG="/etc/rancher/k3s/k3s.yaml"
          
          if [ -f "$K3S_KUBECONFIG" ]; then
            # Copiar kubeconfig sin permisos elevados
            sudo cp "$K3S_KUBECONFIG" "$KUBECONFIG"
            
            # Cambiar propietario para evitar usar sudo en pasos posteriores
            sudo chown $(id -u):$(id -g) "$KUBECONFIG"
            
            # Establecer permisos restrictivos (solo lectura para el owner)
            chmod 600 "$KUBECONFIG"
            
            echo "✓ kubeconfig copiado desde $K3S_KUBECONFIG"
            echo "✓ Propietario cambiado a $(whoami)"
            echo "✓ Permisos establecidos a 600 (solo lectura para owner)"
          else
            echo "⚠ k3s kubeconfig no encontrado en: $K3S_KUBECONFIG"
            echo "El workflow continuará esperando que esté disponible en: $KUBECONFIG"
          fi
          
          echo "::endgroup::"

      - name: Prepare kubeconfig for Artifact
        if: success()
        run: |
          echo "::group::Preparando kubeconfig para artifact"
          
          if [ -f "$KUBECONFIG" ]; then
            # Crear directorio temporal para artefactos
            mkdir -p "$ARTIFACT_DIR"
            
            # Copiar kubeconfig con permisos restrictivos
            cp "$KUBECONFIG" "$ARTIFACT_DIR/kubeconfig"
            chmod 600 "$ARTIFACT_DIR/kubeconfig"
            
            # Verificar que el archivo se copió correctamente
            if [ -f "$ARTIFACT_DIR/kubeconfig" ]; then
              echo "✓ kubeconfig preparado para artifact"
              echo "Tamaño: $(du -h "$ARTIFACT_DIR/kubeconfig" | cut -f1)"
              echo "Permisos: $(stat -c '%a' "$ARTIFACT_DIR/kubeconfig")"
              echo ""
              echo "⚠ IMPORTANTE: Revisa la retención de artifacts (actualmente 30 días)"
              echo "⚠ El kubeconfig contiene credenciales - mantén el acceso restringido"
            else
              echo "✗ ERROR: No se pudo copiar kubeconfig"
              exit 1
            fi
          else
            echo "✗ ERROR: KUBECONFIG no encontrado en: $KUBECONFIG"
            exit 1
          fi
          
          echo "::endgroup::"

      - name: Upload kubeconfig Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kubeconfig
          path: ${{ env.ARTIFACT_DIR }}/kubeconfig
          retention-days: 30
          if-no-files-found: error
          compression-level: 9

      - name: Create Bootstrap Report
        if: always()
        run: |
          echo "::group::Reporte del Bootstrap"
          
          report_file="$ARTIFACT_DIR/bootstrap-report.txt"
          mkdir -p "$(dirname "$report_file")"
          
          {
            echo "Bootstrap Report"
            echo "================"
            echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S Z')"
            echo "Workflow: ${{ github.workflow }}"
            echo "Run ID: ${{ github.run_id }}"
            echo "Run Number: ${{ github.run_number }}"
            echo "Actor: ${{ github.actor }}"
            echo ""
            echo "Inputs:"
            echo "  K3S Version: ${{ inputs.k3s_version }}"
            echo "  Dry-run: ${{ inputs.dry_run }}"
            echo ""
            echo "System:"
            echo "  OS: $(uname -s)"
            echo "  Kernel: $(uname -r)"
            echo ""
            echo "Status: $([ "${{ job.status }}" == 'success' ] && echo '✓ SUCCESS' || echo '✗ FAILED')"
          } > "$report_file"
          
          cat "$report_file"
          echo "::endgroup::"

      - name: Upload Bootstrap Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-report
          path: ${{ env.ARTIFACT_DIR }}/bootstrap-report.txt
          retention-days: 30
          compression-level: 9

      - name: Cleanup on Failure
        if: failure()
        run: |
          echo "::group::Limpieza tras fallo"
          echo "⚠ Bootstrap falló. Manteniendo kubeconfig para debugging."
          echo "✓ Revisa los logs anteriores para detalles del error"
          echo "::endgroup::"

  # NOTA: Para implementar protecciones adicionales en el job "bootstrap":
  # 1. Ve a Settings → Environments → New environment → "lab"
  # 2. Configura:
  #    - Required reviewers: usuarios que deben aprobar antes de ejecutar
  #    - Wait timer: minutos de espera antes de permitir ejecución
  #    - Deployment branches: restringe a ramas específicas (ej: main, develop)
  #    - Environment secrets: credenciales únicas para este environment
  #
  # Con esto, el workflow esperará aprobación antes de ejecutar el job "bootstrap"

      - name: Success Summary
        if: success()
        run: |
          echo "::group::Resumen de éxito"
          echo ""
          echo "✓ Bootstrap completado exitosamente"
          echo "✓ kubeconfig disponible en artifacts"
          echo "✓ Puede ser descargado para interactuar con el cluster"
          echo ""
          echo "Próximos pasos:"
          echo "1. Descargue el kubeconfig de los artifacts"
          echo "2. Exporte: export KUBECONFIG=<ruta-a-kubeconfig>"
          echo "3. Verifique: kubectl get nodes"
          echo ""
          echo "::endgroup::"
