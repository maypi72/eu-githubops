
name: Bootstrap Cluster
on:
  workflow_dispatch:
    inputs:
      install_all:
        type: boolean
        default: false
      k3s_version:
        type: string
        default: 'v1.34.4+k3s1'
      install_k3s:
        type: boolean
        default: true
      install_helm:
        type: boolean
        default: false
      install_ingress:
        type: boolean
        default: false
      install_cert_manager:
        type: boolean
        default: false
      install_sealed_secrets:
        type: boolean
        default: false
      dry_run:
        type: boolean
        default: false
permissions:
  contents: read
  id-token: write
concurrency:
  group: bootstrap-cluster
  cancel-in-progress: true
env:
  INSTALL_ALL: ${{ inputs.install_all == 'true' }}
  DRY_RUN: ${{ inputs.dry_run == 'true' }}
  KUBECONFIG: $HOME/kubeconfig
jobs:
# =========================
# JOB 1 – K3s
# =========================
  install-k3s:
    runs-on: [self-hosted, linux]
    environment: lab
    steps:
      - uses: actions/checkout@v4
      - name: Install K3s
        if: env.INSTALL_ALL == 'true' || inputs.install_k3s == 'true'
        run: |
          set -euo pipefail
          sudo bash infra/bootstrap/bootstrap_k3s.sh
      - name: Wait for K3s
        if: env.INSTALL_ALL == 'true' || inputs.install_k3s == 'true'
        run: |
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          kubectl wait --for=condition=Ready node --all --timeout=300s
# =========================
# JOB 2 – Helm
# =========================
  install-helm:
    needs: install-k3s
    runs-on: [self-hosted, linux]
    steps:
      - name: Install Helm
        if: env.INSTALL_ALL == 'true' || inputs.install_helm == 'true'
        run: |
          set -euo pipefail
          sudo bash infra/bootstrap/bootstrap_helm.sh
# =========================
# JOB 3 – Core Addons
# =========================
  install-addons:
    needs: install-helm
    runs-on: [self-hosted, linux]
    steps:
      - name: Ingress
        if: env.INSTALL_ALL == 'true' || inputs.install_ingress == 'true'
        run: sudo bash infra/bootstrap/bootstrap_ingress.sh
      - name: Cert-Manager
        if: env.INSTALL_ALL == 'true' || inputs.install_cert_manager == 'true'
        run: sudo bash infra/bootstrap/bootstrap_certmanager.sh
      - name: Sealed-Secrets
        if: env.INSTALL_ALL == 'true' || inputs.install_sealed_secrets == 'true'
        run: sudo bash infra/bootstrap/bootstrap_sealed_secrets.sh
