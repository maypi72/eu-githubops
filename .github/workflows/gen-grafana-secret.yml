name: Generate Grafana Secret

on:
  workflow_dispatch:
    inputs:
      grafana_admin_password:
        description: '🔐 Contraseña del admin de Grafana (GRAFANA_ADMIN_PASSWORD)'
        required: true
        type: password
      fetch_cert:
        description: '📥 Descargar certificado del cluster (si ya existe sealed-secrets)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

env:
  KUBECONFIG: $HOME/kubeconfig
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-grafana-secret:
    name: Generate Grafana SealedSecret
    runs-on: [self-hosted, linux]
    timeout-minutes: 15
    environment: lab  # Requiere aprobación/protecciones configuradas en GitHub
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necesario para git operations posteriores
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          echo "::group::Configurando Git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "✓ Git configurado"
          echo "::endgroup::"

      - name: Verify Dependencies
        run: |
          echo "::group::Verificando dependencias"
          
          # Verificar kubectl
          if ! command -v kubectl &> /dev/null; then
            echo "[!] kubectl no encontrado. Intentando descargar..."
            curl -fsSLo /usr/local/bin/kubectl https://dl.k8s.io/release/stable.txt | xargs -I {} curl -fsSLo /usr/local/bin/kubectl https://dl.k8s.io/release/{}/bin/linux/amd64/kubectl
            chmod +x /usr/local/bin/kubectl
          fi
          echo "✓ kubectl disponible"
          
          # Verificar kubeconfig
          if [ ! -f "$KUBECONFIG" ]; then
            echo "[!] Kubeconfig no encontrado en $KUBECONFIG"
            echo "    Descargando desde artifacts del último bootstrap..."
            
            # Descargar kubeconfig del último artefacto disponible
            if ! gh run download -D "$HOME" -n kubeconfig 2>/dev/null; then
              echo "[⚠] No se pudo descargar kubeconfig de los artifacts"
              echo "    Asegúrate de que:"
              echo "    1. El workflow bootstrap-cluster.yml se ejecutó recientemente"
              echo "    2. Los artifacts están disponibles (no expirados)"
              exit 1
            fi
            
            mkdir -p "$(dirname "$KUBECONFIG")"
            mv kubeconfig "$KUBECONFIG" 2>/dev/null || true
          fi
          
          if [ ! -f "$KUBECONFIG" ]; then
            echo "[✗] ERROR: No se pudo obtener kubeconfig"
            exit 1
          fi
          
          chmod 600 "$KUBECONFIG"
          echo "✓ kubeconfig disponible: $KUBECONFIG"
          
          # Verificar conectividad al cluster
          if ! timeout 5 kubectl cluster-info &>/dev/null; then
            echo "[✗] ERROR: No hay conexión al cluster"
            echo "    Verifica que:"
            echo "    1. El cluster está activo y accesible"
            echo "    2. sealed-secrets está instalado en kube-system"
            exit 1
          fi
          echo "✓ Cluster accesible"
          
          echo "::endgroup::"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Environment Variables
        id: prepare-env
        run: |
          echo "::group::Preparando variables de entorno"
          
          # Exportar contraseña de Grafana
          echo "GRAFANA_ADMIN_PASSWORD=${{ inputs.grafana_admin_password }}" >> $GITHUB_ENV
          echo "✓ GRAFANA_ADMIN_PASSWORD configurada"
          
          # Configurar FETCH_CERT si se solicitó
          if [ "${{ inputs.fetch_cert }}" == "true" ]; then
            echo "FETCH_CERT=true" >> $GITHUB_ENV
            echo "✓ FETCH_CERT=true - se descargará certificado del cluster"
          else
            echo "FETCH_CERT=false" >> $GITHUB_ENV
            echo "✓ FETCH_CERT=false - se utilizará certificado local o temporal"
          fi
          
          # Configurar CI environment
          echo "CI=true" >> $GITHUB_ENV
          echo "SKIP_GIT_PUSH=false" >> $GITHUB_ENV
          
          echo "::endgroup::"

      - name: Run gen_grafana_secret.sh
        id: gen-secret
        run: |
          echo "::group::Ejecutando generador de SealedSecret de Grafana"
          
          # Verificar que el script existe
          if [ ! -f "./scripts/gen_grafana_secret.sh" ]; then
            echo "[✗] ERROR: Script no encontrado: ./scripts/gen_grafana_secret.sh"
            exit 1
          fi
          
          # Dar permisos de ejecución
          chmod +x ./scripts/gen_grafana_secret.sh
          
          # Ejecutar el script
          if ! ./scripts/gen_grafana_secret.sh; then
            echo "[✗] ERROR: gen_grafana_secret.sh falló"
            exit 1
          fi
          
          echo "::endgroup::"

      - name: Verify Generated Files
        run: |
          echo "::group::Verificando archivos generados"
          
          SECRET_FILE="infra/grafana/sealed-secrets/grafana-admin.yaml"
          
          if [ ! -f "$SECRET_FILE" ]; then
            echo "[✗] ERROR: Archivo sellado no fue creado: $SECRET_FILE"
            exit 1
          fi
          
          if [ ! -s "$SECRET_FILE" ]; then
            echo "[✗] ERROR: Archivo sellado está vacío: $SECRET_FILE"
            exit 1
          fi
          
          echo "✓ SealedSecret generado correctamente"
          echo ""
          echo "Información del archivo:"
          ls -lh "$SECRET_FILE"
          echo ""
          
          # Mostrar información sobre el tipo de secret
          if grep -q "SealedSecret" "$SECRET_FILE"; then
            echo "✓ Archivo contiene un SealedSecret válido"
            
            # Extraer nombre del secret
            SECRET_NAME=$(grep "name:" "$SECRET_FILE" | head -1 | awk '{print $2}')
            NAMESPACE=$(grep "namespace:" "$SECRET_FILE" | head -1 | awk '{print $2}')
            echo "  Nombre: $SECRET_NAME"
            echo "  Namespace: $NAMESPACE"
          else
            echo "[✗] ERROR: Archivo no contiene un SealedSecret válido"
            exit 1
          fi
          
          # Verificar certificado si fue descargado
          if [ -f "infra/sealed-secrets/pub-cert.pem" ]; then
            echo ""
            echo "✓ Certificado público incluido"
            ls -lh "infra/sealed-secrets/pub-cert.pem"
          fi
          
          echo "::endgroup::"

      - name: Commit and Push Changes
        id: commit-push
        run: |
          echo "::group::Git commit y push"
          
          # Verificar si hay cambios
          if ! git diff --cached --quiet || ! git diff --quiet; then
            echo "Cambios detectados - creando commit..."
            
            # Stage de archivos
            git add infra/grafana/sealed-secrets/grafana-admin.yaml
            git add infra/sealed-secrets/pub-cert.pem 2>/dev/null || true
            
            # Crear mensaje de commit
            if [ "${{ inputs.fetch_cert }}" == "true" ]; then
              COMMIT_MSG="chore: update Grafana sealed secret and cluster certificate"
            else
              COMMIT_MSG="chore: update Grafana sealed secret"
            fi
            
            # Commit
            git commit -m "$COMMIT_MSG"
            echo "✓ Commit creado: $COMMIT_MSG"
            
            # Push
            git push origin $(git rev-parse --abbrev-ref HEAD)
            echo "✓ Push realizado a la rama actual"
          else
            echo "[!] Sin cambios para hacer commit"
          fi
          
          echo "::endgroup::"

      - name: Verify Deployment Readiness
        run: |
          echo "::group::Verificando disponibilidad del SealedSecret"
          
          # Esperar un poco para que git procese
          sleep 2
          
          # Verificar que el archivo existe en git
          if git ls-files --error-unmatch infra/grafana/sealed-secrets/grafana-admin.yaml &>/dev/null; then
            echo "✓ SealedSecret está en git y listo para deploy"
            
            echo ""
            echo "📋 Próximos pasos para desplegar Grafana:"
            echo "  1. Crear manifiestos en: platform/apps/grafana/"
            echo "  2. Crear application.yaml para ArgoCD"
            echo "  3. Crear values.yaml con configuración de Grafana"
            echo "  4. Sincronizar con ArgoCD"
            echo ""
            echo "El SealedSecret estará disponible en el namespace 'grafana'"
          else
            echo "[!] Advertencia: SealedSecret no aparece en git"
            echo "    Verifica manualmente con: git log --oneline -5"
          fi
          
          echo "::endgroup::"

      - name: Summary
        if: always()
        run: |
          echo "════════════════════════════════════════════════"
          echo "✓ Workflow completado"
          echo "════════════════════════════════════════════════"
          echo ""
          echo "📁 Archivos generados:"
          echo "  • infra/grafana/sealed-secrets/grafana-admin.yaml (SealedSecret)"
          if [ -f "infra/sealed-secrets/pub-cert.pem" ]; then
            echo "  • infra/sealed-secrets/pub-cert.pem (Certificado público)"
          fi
          echo ""
          echo "🔐 Seguridad:"
          echo "  • Contraseña: Encriptada con Sealed Secrets"
          echo "  • Certificado: Obtenido del cluster"
          echo "  • Archivo: Seguro para commitear a git"
          echo ""
          echo "📝 Commits realizados:"
          git log --oneline -1
          echo ""
          echo "════════════════════════════════════════════════"
