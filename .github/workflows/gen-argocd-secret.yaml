name: Generate ArgoCD Secret

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  generate-secret:
    name: Generate ArgoCD Secret
    runs-on: [self-hosted, linux]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup KUBECONFIG
        run: |
          KUBECONFIG="${HOME}/kubeconfig"
          export KUBECONFIG
          if [ ! -f "$KUBECONFIG" ]; then
            echo "[!] KUBECONFIG no encontrado en $KUBECONFIG"
            echo "Intentando obtenerlo de /etc/rancher/k3s/k3s.yaml..."
            if [ -f "/etc/rancher/k3s/k3s.yaml" ]; then
              sudo cp /etc/rancher/k3s/k3s.yaml "$KUBECONFIG"
              sudo chmod 600 "$KUBECONFIG"
              sudo chown "$(id -u):$(id -g)" "$KUBECONFIG"
              echo "[✓] KUBECONFIG copiado de /etc/rancher/k3s/k3s.yaml"
            else
              echo "[✗] No se pudo encontrar kubeconfig"
              exit 1
            fi
          fi
          echo "KUBECONFIG=$KUBECONFIG" >> $GITHUB_ENV

      - name: Generate ArgoCD Secret
        env:
          ARGOCD_ADMIN_PASSWORD: ${{ secrets.ARGOCD_ADMIN_PASSWORD }}
          KUBECONFIG: ${{ env.KUBECONFIG }}
        run: |
          if [ -f "./scripts/gen_argocd_secret.sh" ]; then
            if [ ! -x "./scripts/gen_argocd_secret.sh" ]; then
              chmod +x ./scripts/gen_argocd_secret.sh
            fi
            ./scripts/gen_argocd_secret.sh
          else
            echo "[✗] Script no encontrado"
            exit 1
          fi

      - name: Verify sealed secret
        run: |
          echo "::group::Verificando Secret sellado"
          if [ -f "infra/argocd/sealed-secrets/argocd-secret.yaml" ]; then
            echo "[✓] Archivo generado correctamente"
            echo "Contenido del archivo:"
            cat infra/argocd/sealed-secrets/argocd-secret.yaml
          else
            echo "[✗] Archivo no encontrado"
            exit 1
          fi
          echo "::endgroup::"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: argocd-sealed-secret
          path: infra/argocd/sealed-secrets/argocd-secret.yaml
          retention-days: 7

      - name: Workflow summary
        if: always()
        run: |
          echo "## ArgoCD Secret Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: $(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: $(git rev-parse --short HEAD)" >> $GITHUB_STEP_SUMMARY
          if [ -f "infra/argocd/sealed-secrets/argocd-secret.yaml" ]; then
            echo "- **Status**: ✅ Secret generated and pushed" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status**: ❌ Generation failed" >> $GITHUB_STEP_SUMMARY
          fi
