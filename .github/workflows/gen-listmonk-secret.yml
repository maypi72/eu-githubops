name: Generate ListMonk Secret

on:
  workflow_dispatch:
    inputs:
      fetch_cert:
        description: "Fetch sealed-secrets certificate from cluster"
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - 'scripts/gen_listmonk_secret.sh'
      - '.github/workflows/gen-listmonk-secret.yml'

jobs:
  generate-secret:
    name: Generate ListMonk Database Secret
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup kubeconfig
        env:
          KUBECONFIG: /home/manu/.kube/config
        run: |
          echo "📋 Kubeconfig: $KUBECONFIG"
          if [[ -f "$KUBECONFIG" ]]; then
            echo "✅ Kubeconfig found"
          else
            echo "❌ Kubeconfig not found"
          fi
      
      - name: Verify dependencies
        run: |
          echo "🔍 Verificando dependencias..."
          which kubectl && echo "✅ kubectl OK" || echo "❌ kubectl missing"
          which kubeseal && echo "✅ kubeseal OK" || echo "❌ kubeseal missing"
          which yq && echo "✅ yq OK" || echo "❌ yq missing"
      
      - name: Fetch sealed-secrets certificate
        if: ${{ inputs.fetch_cert == true }}
        env:
          KUBECONFIG: /home/manu/.kube/config
        run: |
          echo "🔍 Buscando certificado de sealed-secrets..."
          
          # Intentar obtener el certificado del cluster
          if kubectl get secret -n kube-system sealed-secrets-key &>/dev/null; then
            echo "✅ Secret de sealed-secrets encontrado"
            
            # Extraer el certificado
            kubectl get secret -n kube-system sealed-secrets-key -o yaml | \
            yq eval '.data."tls.crt" | @base64d' > /tmp/pub-cert.pem
            
            mkdir -p infra/sealed-secrets
            cp /tmp/pub-cert.pem infra/sealed-secrets/pub-cert.pem
            echo "✅ Certificado actualizado"
          else
            echo "⚠️ No se encontró el secret de sealed-secrets"
          fi
      
      - name: Make script executable
        run: |
          chmod +x scripts/gen_listmonk_secret.sh
          echo "✅ Script es ejecutable"
      
      - name: Create namespace if needed
        env:
          KUBECONFIG: /home/manu/.kube/config
        run: |
          echo "🔍 Verificando namespace listmonk..."
          if kubectl get namespace listmonk &>/dev/null; then
            echo "✅ Namespace listmonk ya existe"
          else
            echo "📝 Creando namespace listmonk..."
            kubectl create namespace listmonk || echo "⚠️ No se pudo crear (cluster no accesible)"
          fi
      
      - name: Generate ListMonk Secret
        env:
          LISTMONK_DB_USER: ${{ secrets.LISTMONK_DB_USER }}
          LISTMONK_DB_PASSWORD: ${{ secrets.LISTMONK_DB_PASSWORD }}
          KUBECONFIG: /home/manu/.kube/config
        run: |
          echo "🔐 Generando secreto..."
          echo ""
          echo "Ejecutando script..."
          if LISTMONK_DB_USER="$LISTMONK_DB_USER" \
             LISTMONK_DB_PASSWORD="$LISTMONK_DB_PASSWORD" \
             bash scripts/gen_listmonk_secret.sh; then
            echo "[✓] Secreto generado exitosamente"
            echo "secret_generated=true" >> $GITHUB_OUTPUT
          else
            echo "[✗] Error generando secreto"
            exit 1
          fi
      
      - name: Verify secret file exists
        run: |
          if [[ -f "apps/applications/listmonk/sealed-secrets/listmonk-db-secret.yaml" ]]; then
            echo "✅ Archivo de secreto existe"
            echo ""
            echo "Contenido:"
            cat apps/applications/listmonk/sealed-secrets/listmonk-db-secret.yaml
          else
            echo "❌ Archivo de secreto no encontrado"
            exit 1
          fi
      
      - name: Check for changes
        id: changes
        run: |
          if git -C . diff-index --quiet HEAD --; then
            echo "No changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git -C . status -s
          fi
      
      - name: Configure git
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          echo "✅ Git configurado"
      
      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          echo "📝 Realizando commit..."
          git add apps/applications/listmonk/sealed-secrets/listmonk-db-secret.yaml
          
          git commit -m "chore: regenerate listmonk database secret" || true
          
          echo "🚀 Push a origin/main..."
          git push origin main
          
          echo "✅ Cambios pusheados"
      
      - name: Summary
        run: |
          echo ""
          echo "✅ ============================================"
          echo "✅ Workflow completado"
          echo "✅ ============================================"
          echo ""
          echo "Secret ubicación: apps/applications/listmonk/sealed-secrets/listmonk-db-secret.yaml"
          echo ""
          echo "Próximos pasos:"
          echo "  • ArgoCD sincronizará el cambio automáticamente"
          echo "  • El SealedSecret se desellará en el cluster"
          echo "  • El Secret estará disponible para ListMonk"
          echo ""
