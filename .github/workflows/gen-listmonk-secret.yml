name: Generate ListMonk Secret

on:
  workflow_dispatch:
    inputs:
      fetch_cert:
        description: '📥 Descargar certificado del cluster'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

env:
  KUBECONFIG: $HOME/kubeconfig
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-listmonk-secret:
    name: Generate ListMonk SealedSecret
    runs-on: [self-hosted, linux]
    timeout-minutes: 15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          echo "::group::Configurando Git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "✓ Git configurado"
          echo "::endgroup::"

      - name: Setup kubeconfig
        id: setup-kubeconfig
        run: |
          echo "::group::Configurando kubeconfig"
          
          KUBECONFIG_FOUND=false
          
          KUBECONFIG_PATHS=(
            "$KUBECONFIG"
            "/etc/rancher/k3s/k3s.yaml"
            "$HOME/kubeconfig"
            "$HOME/.kube/config"
          )
          
          echo "Buscando KUBECONFIG en rutas locales..."
          for kb_path in "${KUBECONFIG_PATHS[@]}"; do
            if [ -f "$kb_path" ]; then
              echo "[✓] KUBECONFIG encontrado en: $kb_path"
              
              if [ "$kb_path" != "$KUBECONFIG" ]; then
                echo "  Copiando a: $KUBECONFIG"
                mkdir -p "$(dirname "$KUBECONFIG")"
                cp "$kb_path" "$KUBECONFIG"
                chmod 600 "$KUBECONFIG"
              fi
              
              export KUBECONFIG="$KUBECONFIG"
              echo "KUBECONFIG=$KUBECONFIG" >> $GITHUB_ENV
              
              KUBECONFIG_FOUND=true
              break
            fi
          done
          
          if [ "$KUBECONFIG_FOUND" = false ]; then
            echo "[!] KUBECONFIG no encontrado localmente"
            exit 1
          fi
          
          if [ -f "$KUBECONFIG" ]; then
            chmod 600 "$KUBECONFIG" 2>/dev/null || true
            echo "[✓] KUBECONFIG validado"
            
            if timeout 10 kubectl cluster-info &>/dev/null; then
              echo "[✓] Conexión al cluster OK"
            else
              echo "[✗] No se puede conectar al cluster"
              exit 1
            fi
          else
            echo "[✗] ERROR: KUBECONFIG no es accesible"
            exit 1
          fi
          
          echo "::endgroup::"

      - name: Verify Dependencies
        run: |
          echo "::group::Verificando dependencias"
          
          for tool in "yq" "kubeseal"; do
            if command -v "$tool" >/dev/null 2>&1; then
              echo "[✓] $tool disponible"
            else
              echo "[!] $tool no está instalado"
            fi
          done
          
          echo "::endgroup::"

      - name: Generate ListMonk Sealed Secret
        id: generate-secret
        env:
          LISTMONK_DB_USER: ${{ secrets.LISTMONK_DB_USER }}
          LISTMONK_DB_PASSWORD: ${{ secrets.LISTMONK_DB_PASSWORD }}
        run: |
          echo "::group::Generando secreto sellado de ListMonk"
          
          if [ -z "$LISTMONK_DB_USER" ]; then
            echo "[✗] ERROR: LISTMONK_DB_USER no está definida"
            exit 1
          fi
          echo "[✓] LISTMONK_DB_USER configurada"
          
          if [ -z "$LISTMONK_DB_PASSWORD" ]; then
            echo "[✗] ERROR: LISTMONK_DB_PASSWORD no está definida"
            exit 1
          fi
          echo "[✓] LISTMONK_DB_PASSWORD configurada"
          
          if [ ! -f "scripts/gen_listmonk_secret.sh" ]; then
            echo "[✗] ERROR: script no encontrado"
            exit 1
          fi
          echo "[✓] Script encontrado"
          
          chmod +x scripts/gen_listmonk_secret.sh
          
          echo ""
          echo "Ejecutando generación..."
          if LISTMONK_DB_USER="$LISTMONK_DB_USER" \
             LISTMONK_DB_PASSWORD="$LISTMONK_DB_PASSWORD" \
             bash scripts/gen_listmonk_secret.sh; then
            echo "[✓] Secreto generado exitosamente"
            echo "secret_generated=true" >> $GITHUB_OUTPUT
          else
            echo "[✗] Error generando secreto"
            exit 1
          fi
          
          SEALED_SECRET_FILE="apps/applications/listmonk/sealed-secrets/listmonk-db-secret.yaml"
          if [ ! -f "$SEALED_SECRET_FILE" ]; then
            echo "[✗] ERROR: archivo no generado"
            exit 1
          fi
          echo "[✓] Archivo generado correctamente"
          
          if yq eval '.' "$SEALED_SECRET_FILE" > /dev/null 2>&1; then
            echo "[✓] YAML válido"
          else
            echo "[✗] ERROR: YAML inválido"
            exit 1
          fi
          
          KIND=$(yq eval '.kind' "$SEALED_SECRET_FILE" 2>/dev/null)
          if [ "$KIND" = "SealedSecret" ] || [ "$KIND" = "Secret" ]; then
            echo "[✓] kind válido: $KIND"
          else
            echo "[✗] ERROR: kind debe ser SealedSecret o Secret"
            exit 1
          fi
          
          echo "::endgroup::"

      - name: Verify Changes
        if: success() && steps.generate-secret.outputs.secret_generated == 'true'
        run: |
          echo "::group::Verificando cambios"
          
          SEALED_SECRET_FILE="apps/applications/listmonk/sealed-secrets/listmonk-db-secret.yaml"
          if [ -f "$SEALED_SECRET_FILE" ]; then
            echo "✓ SealedSecret generado"
            echo ""
            echo "Secret Info:"
            yq eval '.metadata' "$SEALED_SECRET_FILE"
          fi
          
          echo ""
          echo "[i] Commit y push realizados por el script"
          
          echo "::endgroup::"

      - name: Summary
        if: success()
        run: |
          echo ""
          echo "✅ ============================================"
          echo "✅ Workflow completado"
          echo "✅ ============================================"
          echo ""
          echo "📄 Ubicación: apps/applications/listmonk/sealed-secrets/listmonk-db-secret.yaml"
          echo ""
          echo "Próximos pasos:"
          echo "  • ArgoCD sincronizará automáticamente"
          echo "  • El SealedSecret se desellará en el cluster"
          echo ""
