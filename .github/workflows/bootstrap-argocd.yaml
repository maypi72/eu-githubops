name: Bootstrap ArgoCD

on:
  workflow_dispatch:
    inputs:
      fetch_cert:
        description: '📥 Descargar certificado del cluster y actualizar pub-cert.pem'
        type: boolean
        default: false

      apply_sealed_secret:
        description: '⚙️ Aplicar secreto sellado al cluster'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  actions: read

env:
  KUBECONFIG: ${{ runner.home }}/.kube/config
  ARTIFACT_DIR: ${{ runner.home }}/bootstrap-artifacts

jobs:
  bootstrap-argocd:
    name: Bootstrap ArgoCD
    runs-on: [self-hosted, linux]
    timeout-minutes: 15
    environment: lab

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------------------------
      # PRECHECKS
      # -------------------------------------------------
      - name: Verify kubeconfig
        run: |
          echo "::group::Verificando kubeconfig"
          if [ ! -f "$KUBECONFIG" ]; then
            echo "[✗] KUBECONFIG no encontrado en $KUBECONFIG"
            exit 1
          fi

          kubectl cluster-info >/dev/null
          echo "[✓] Conectado al cluster"
          echo "::endgroup::"

      - name: Verify required tools
        run: |
          echo "::group::Verificando herramientas"
          for tool in kubectl helm yq kubeseal htpasswd; do
            if ! command -v "$tool" >/dev/null; then
              echo "[✗] Falta herramienta: $tool"
              exit 1
            fi
            echo "[✓] $tool"
          done
          echo "::endgroup::"

      # -------------------------------------------------
      # CERTIFICATE HANDLING
      # -------------------------------------------------
      - name: Fetch Sealed-Secrets Certificate
        if: inputs.fetch_cert
        run: |
          echo "::group::Descargando certificado sealed-secrets"
          mkdir -p infra/sealed-secrets
          kubectl get secrets -n kube-system sealed-secrets-key \
            -o jsonpath='{.data.cert\.pem}' | base64 -d \
            > infra/sealed-secrets/pub-cert.pem
          echo "[✓] Certificado actualizado"
          echo "::endgroup::"

      # -------------------------------------------------
      # SECRET GENERATION
      # -------------------------------------------------
      - name: Generate ArgoCD Sealed Secret
        id: generate-secret
        env:
          ARGOCD_ADMIN_PASSWORD: ${{ secrets.ARGOCD_ADMIN_PASSWORD }}
        run: |
          echo "::group::Generando secreto sellado"
          if [ -z "$ARGOCD_ADMIN_PASSWORD" ]; then
            echo "[✗] ARGOCD_ADMIN_PASSWORD no definido"
            exit 1
          fi

          chmod +x scripts/gen_argocd_secret.sh
          bash scripts/gen_argocd_secret.sh
          echo "generated=true" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      # -------------------------------------------------
      # APPLY TO CLUSTER (OPTIONAL)
      # -------------------------------------------------
      - name: Apply Sealed Secret to Cluster
        if: inputs.apply_sealed_secret && steps.generate-secret.outputs.generated == 'true'
        run: |
          echo "::group::Aplicando SealedSecret"
          kubectl apply -f infra/argocd/sealed-secrets/argocd-secret.yaml
          echo "[✓] Secreto aplicado"
          echo "::endgroup::"

      # -------------------------------------------------
      # BOOTSTRAP ARGOCD
      # -------------------------------------------------
      - name: Install / Upgrade ArgoCD
        run: |
          echo "::group::Bootstrap ArgoCD"
          chmod +x infra/bootstrap/bootstrap_argocd.sh
          bash infra/bootstrap/bootstrap_argocd.sh
          echo "::endgroup::"

      # -------------------------------------------------
      # COMMIT CHANGES
      # -------------------------------------------------
      - name: Push generated files
        if: success()
        run: |
          if git status --porcelain | grep -q infra/; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add infra/
            git commit -m "chore: update ArgoCD sealed secrets"
            git push
          fi