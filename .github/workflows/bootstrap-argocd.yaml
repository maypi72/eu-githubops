name: Bootstrap ArgoCD

# Este workflow configura ArgoCD en el cluster Kubernetes
# REQUISITO: Debe existir el GitHub Secret ARGOCD_ADMIN_PASSWORD
# Crear en: Settings > Secrets and variables > Actions > New repository secret
#
# 📥 INPUT: fetch_cert
#   • true:  Descargar certificado público del cluster (sealed-secrets)
#            └─ Crea/sobrescribe infra/sealed-secrets/pub-cert.pem
#            └─ Hace commit y push automáticamente
#   • false: Usa certificado local o genera temporal auto-firmado
#
# ⚙️ INPUT: apply_sealed_secret
#   • true:  Aplica el secreto AL CLUSTER (cuando cambias contraseña)
#            └─ Úsalo para nuevas instalaciones o cambios de contraseña
#   • false: Solo genera/actualiza archivos en repositorio (SIN aplicar al cluster)
#            └─ Úsalo para upgrades, actualizaciones de certificado, etc.
#
# 📋 Casos de uso comunes:
#
#   1. NUEVA INSTALACIÓN (después de bootstrap-cluster.yml):
#      fetch_cert: true    (obtener certificado real del cluster)
#      apply_sealed_secret: true  (aplicar secreto al cluster)
#
#   2. UPGRADE DE ARGOCD (sin cambiar contraseña):
#      fetch_cert: false   (mantener certificado actual)
#      apply_sealed_secret: false  (no cambiar secret en cluster)
#
#   3. CAMBIAR CONTRASEÑA (con cluster existente):
#      fetch_cert: false   (mantener certificado actual)
#      apply_sealed_secret: true   (aplicar nueva contraseña al cluster)
#
#   4. ACTUALIZAR CERTIFICADO (cambio de sealed-secrets):
#      fetch_cert: true    (obtener nuevo certificado)
#      apply_sealed_secret: false  (no aplicar secret, solo actualizar .pem)
#
on:
  workflow_dispatch:
    inputs:
      fetch_cert:
        description: '📥 Descargar certificado del cluster Y actualizar .pem en repo (crear/sobrescribir)'
        required: false
        default: true
        type: boolean
      apply_sealed_secret:
        description: '⚙️ Aplicar secreto al cluster (solo si cambió la contraseña) [¡desmarcar para upgrades sin cambios!]'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write
  actions: read

env:
  KUBECONFIG: $HOME/kubeconfig
  RETRY_MAX: 5
  RETRY_DELAY: 2
  ARTIFACT_DIR: $HOME/bootstrap-artifacts

jobs:
  bootstrap-argocd:
    name: Bootstrap ArgoCD
    runs-on: [self-hosted, linux]
    timeout-minutes: 15
    environment: lab

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Display Operation Mode
        run: |
          echo "::group::📋 Modo de operación"
          echo ""
          echo "Configuración seleccionada:"
          echo ""
          
          if [ "${{ inputs.fetch_cert }}" == "true" ]; then
            echo "📥 fetch_cert = true"
            echo "   └─ Descargará certificado del cluster (sealed-secrets)"
            echo "   └─ Guardará en: infra/sealed-secrets/pub-cert.pem"
            echo "   └─ Hará commit y push al repositorio"
            echo ""
          else
            echo "📥 fetch_cert = false"
            echo "   └─ Usará certificado local existente"
            echo "   └─ Si no existe: generará certificado temporal auto-firmado"
            echo ""
          fi
          
          if [ "${{ inputs.apply_sealed_secret }}" == "true" ]; then
            echo "⚙️ apply_sealed_secret = true"
            echo "   └─ Aplicará el secreto al cluster INMEDIATAMENTE"
            echo "   └─ ✅ Úsalo cuando: cambies la contraseña de ArgoCD"
            echo ""
          else
            echo "⚙️ apply_sealed_secret = false"
            echo "   └─ NO aplicará el secreto al cluster"
            echo "   └─ Solo actualiza el repositorio"
            echo "   └─ ✅ Úsalo cuando:"
            echo "      • Upgrade de ArgoCD (sin cambiar password)"
            echo "      • Actualizar certificado (sin cambiar password)"
            echo "      • Re-generar secreto (sin cambios reales)"
            echo ""
          fi
          
          echo "Resumen:"
          if [ "${{ inputs.fetch_cert }}" == "true" ] && [ "${{ inputs.apply_sealed_secret }}" == "true" ]; then
            echo "  🔄 Completo: descarga cert + actualiza secret en cluster"
          elif [ "${{ inputs.fetch_cert }}" == "true" ] && [ "${{ inputs.apply_sealed_secret }}" == "false" ]; then
            echo "  📥 Solo cert: descarga certificado y lo sube al repo"
          elif [ "${{ inputs.fetch_cert }}" == "false" ] && [ "${{ inputs.apply_sealed_secret }}" == "true" ]; then
            echo "  ⚙️ Solo secret: genera secreto con cert local y lo aplica"
          else
            echo "  🔍 Inspección: regenera archivos sin aplicar cambios"
          fi
          
          echo ""
          echo "::endgroup::"

      - name: Download kubeconfig artifact (optional)
        id: download-artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: kubeconfig
          path: ${{ runner.temp }}/kubeconfig-artifact

      - name: Setup kubeconfig
        run: |
          echo "::group::Configurando kubeconfig"
          
          KUBECONFIG_FOUND=false
          
          # Buscar kubeconfig en rutas locales primero (desde bootstrap-cluster.yml)
          KUBECONFIG_PATHS=(
            "$KUBECONFIG"
            "/etc/rancher/k3s/k3s.yaml"
            "$HOME/kubeconfig"
            "$HOME/.kube/config"
          )
          
          echo "Buscando KUBECONFIG en rutas locales..."
          for kb_path in "${KUBECONFIG_PATHS[@]}"; do
            if [ -f "$kb_path" ]; then
              echo "[✓] KUBECONFIG encontrado localmente: $kb_path"
              
              # Asegurar que KUBECONFIG apunta al archivo correcto
              export KUBECONFIG="$kb_path"
              echo "KUBECONFIG=$KUBECONFIG" >> $GITHUB_ENV
              
              KUBECONFIG_FOUND=true
              break
            fi
          done
          
          # Si no se encuentra localmente, intentar usar artefacto descargado
          if [ "$KUBECONFIG_FOUND" = false ]; then
            echo "[!] KUBECONFIG no encontrado localmente"
            
            if [ "${{ steps.download-artifact.outcome }}" = "success" ] && [ -f "${{ runner.temp }}/kubeconfig-artifact/kubeconfig" ]; then
              echo "[✓] Usando artefacto descargado de bootstrap-cluster"
              cp "${{ runner.temp }}/kubeconfig-artifact/kubeconfig" "$KUBECONFIG"
              chmod 600 "$KUBECONFIG"
              echo "KUBECONFIG=$KUBECONFIG" >> $GITHUB_ENV
              echo "[✓] KUBECONFIG configurado desde artefacto: $KUBECONFIG"
              KUBECONFIG_FOUND=true
            else
              echo "[✗] Artefacto no disponible (expirado o no existe)"
              echo ""
              echo "Por favor:"
              echo "  1. Ejecuta el workflow 'bootstrap-cluster.yml' para generar nuevo artefacto"
              echo "  2. O asegúrate que k3s está instalado en /etc/rancher/k3s/k3s.yaml"
              echo "  3. O define KUBECONFIG en \$HOME/kubeconfig"
              exit 1
            fi
          fi
          
          # Verificar que KUBECONFIG es accesible
          if [ -f "$KUBECONFIG" ]; then
            echo "[✓] KUBECONFIG validado: $(ls -lh $KUBECONFIG | awk '{print $5, $9}')"
            echo "[✓] Conectando al cluster..."
            if kubectl cluster-info &>/dev/null; then
              echo "[✓] Conexión al cluster OK"
            else
              echo "[✗] No se puede conectar al cluster"
              exit 1
            fi
          else
            echo "[✗] ERROR: KUBECONFIG no es accesible en $KUBECONFIG"
            exit 1
          fi
          
          echo "::endgroup::"

      - name: Prepare Bootstrap Environment
        run: |
          echo "::group::Preparando entorno de bootstrap"
          
          # Crear directorio de artefactos
          mkdir -p $ARTIFACT_DIR
          
          # Validar scripts de bootstrap
          required_files=(
            "infra/bootstrap/bootstrap_argocd.sh"
          )
          
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "[✓] $file encontrado"
              if [ ! -x "$file" ]; then
                chmod +x "$file"
                echo "  [✓] Permisos ejecutables otorgados"
              fi
            else
              echo "[✗] ERROR: $file no encontrado"
              exit 1
            fi
          done
          
          echo "[✓] Archivos validados"
          
          echo "::endgroup::"

      - name: System Information
        run: |
          echo "::group::Información del sistema"
          echo "OS: $(uname -s)"
          echo "Kernel: $(uname -r)"
          echo "Arquitectura: $(uname -m)"
          echo "::endgroup::"

      - name: Check Prerequisites
        run: |
          echo "::group::Verificación de herramientas"
          
          tools=("kubectl" "helm")
          for tool in "${tools[@]}"; do
            if command -v "$tool" >/dev/null 2>&1; then
              version=$($tool version --short 2>&1 | head -1 || $tool --version 2>&1 | head -1)
              echo "[✓] $tool: $version"
            else
              echo "[✗] ERROR: $tool no está instalado"
              exit 1
            fi
          done
          
          echo "::endgroup::"

      - name: Verify Dependencies for Secret Generation
        run: |
          echo "::group::Verificando dependencias para generación de secreto"
          
          tools=("htpasswd" "yq" "kubeseal")
          for tool in "${tools[@]}"; do
            if command -v "$tool" >/dev/null 2>&1; then
              version=$($tool --version 2>&1 | head -1 || echo "instalado")
              echo "[✓] $tool: $version"
            else
              echo "[!] $tool no está instalado (se instalará durante el proceso)"
            fi
          done
          
          echo "::endgroup::"

      - name: Fetch Sealed-Secrets Certificate
        if: inputs.fetch_cert == true
        run: |
          echo "::group::Descargando certificado de sealed-secrets"
          
          export KUBECONFIG
          
          # Crear directorio si no existe
          mkdir -p infra/sealed-secrets
          
          # Intentar descargar el certificado
          DOWNLOAD_SUCCESS=false
          
          # Intento 1: Usar kubeseal --fetch-cert
          if timeout 10 kubeseal --fetch-cert \
            --controller-name=sealed-secrets \
            --controller-namespace=kube-system \
            > infra/sealed-secrets/pub-cert.pem 2>/dev/null && [ -s infra/sealed-secrets/pub-cert.pem ]; then
            echo "[✓] Certificado descargado con kubeseal --fetch-cert"
            DOWNLOAD_SUCCESS=true
          fi
          
          # Intento 2: Descargar usando kubectl
          if [ "$DOWNLOAD_SUCCESS" = "false" ] && timeout 10 kubectl get secret \
            -n kube-system sealed-secrets-key \
            -o jsonpath='{.data.tls\.crt}' 2>/dev/null | \
            base64 -d > infra/sealed-secrets/pub-cert.pem 2>/dev/null && [ -s infra/sealed-secrets/pub-cert.pem ]; then
            echo "[✓] Certificado descargado desde sealed-secrets-key"
            DOWNLOAD_SUCCESS=true
          fi
          
          if [ "$DOWNLOAD_SUCCESS" = "true" ]; then
            echo "[✓] Certificado guardado en: infra/sealed-secrets/pub-cert.pem"
            # Verificar que es válido
            if openssl x509 -in infra/sealed-secrets/pub-cert.pem -noout &>/dev/null; then
              echo "[✓] Certificado validado correctamente"
            else
              echo "[✗] ERROR: Certificado descargado pero NO ES VÁLIDO"
              exit 1
            fi
          else
            echo "[✗] ERROR: No se pudo descargar certificado de sealed-secrets"
            echo ""
            echo "Diagnosticando:"
            echo "  • sealed-secrets instalado:"
            kubectl get deployment -n kube-system sealed-secrets-controller 2>/dev/null || echo "    [✗] No encontrado"
            echo ""
            echo "  • Pods de sealed-secrets:"
            kubectl get pods -n kube-system -l app.kubernetes.io/name=sealed-secrets 2>/dev/null || echo "    [✗] No encontrados"
            echo ""
            echo "  • kubeseal disponible:"
            which kubeseal || echo "    [✗] No encontrado"
            exit 1
          fi
          
          echo "::endgroup::"

      - name: Generate ArgoCD Sealed Secret
        id: generate-secret
        env:
          ARGOCD_ADMIN_PASSWORD: ${{ secrets.ARGOCD_ADMIN_PASSWORD }}
          FETCH_CERT: ${{ inputs.fetch_cert }}
        run: |
          echo "::group::Generando secreto sellado de ArgoCD"
          
          # Mostrar configuración
          echo "[i] Configuración:"
          echo "    FETCH_CERT: $FETCH_CERT"
          echo ""
          
          # Verificar que la contraseña está configurada
          if [ -z "$ARGOCD_ADMIN_PASSWORD" ]; then
            echo "[✗] ERROR: ARGOCD_ADMIN_PASSWORD no está definida en GitHub Secrets"
            echo "    Agrega el secret en: Settings > Secrets and variables > Actions"
            exit 1
          fi
          echo "[✓] ARGOCD_ADMIN_PASSWORD está configurada"
          
          # Verificar que el script existe
          if [ ! -f "scripts/gen_argocd_secret.sh" ]; then
            echo "[✗] ERROR: scripts/gen_argocd_secret.sh no encontrado"
            exit 1
          fi
          echo "[✓] Script de generación encontrado"
          
          # Hacer el script ejecutable
          chmod +x scripts/gen_argocd_secret.sh
          echo "[✓] Permisos ejecutables otorgados"
          
          # Verificar e instalar kubeseal si es necesario
          echo ""
          echo "Verificando kubeseal..."
          if ! command -v kubeseal &>/dev/null; then
            echo "[!] kubeseal no está instalado en el runner"
            echo "    Descargando e instalando kubeseal v0.24.0..."
            
            KUBESEAL_TMP=$(mktemp -d)
            trap "rm -rf $KUBESEAL_TMP" EXIT
            
            if ! wget -qO - https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.24.0/kubeseal-0.24.0-linux-amd64.tar.gz | \
                 tar xfz - -C "$KUBESEAL_TMP"; then
              echo "[✗] ERROR: No se pudo descargar kubeseal"
              exit 1
            fi
            
            if ! sudo mv "$KUBESEAL_TMP/kubeseal" /usr/local/bin/ || \
               ! sudo chmod +x /usr/local/bin/kubeseal; then
              echo "[✗] ERROR: No se pudo instalar kubeseal en /usr/local/bin"
              exit 1
            fi
            
            echo "[✓] kubeseal instalado exitosamente"
          else
            KUBESEAL_VERSION=$(kubeseal --version 2>&1 | grep -oP 'v\d+\.\d+\.\d+')
            echo "[✓] kubeseal disponible: $KUBESEAL_VERSION"
          fi
          
          # Verificar e instalar herramientas de CLI si es necesario
          echo ""
          echo "Verificando herramientas adicionales..."
          TOOLS_TO_INSTALL=()
          
          if ! command -v htpasswd &>/dev/null; then
            TOOLS_TO_INSTALL+=("apache2-utils")
          else
            echo "[✓] htpasswd disponible"
          fi
          
          if ! command -v yq &>/dev/null; then
            echo "[!] yq no disponible - Se instalará"
          else
            echo "[✓] yq disponible"
          fi
          
          if ! command -v jq &>/dev/null; then
            TOOLS_TO_INSTALL+=("jq")
          else
            echo "[✓] jq disponible"
          fi
          
          # Instalar paquetes si es necesario
          if [ ${#TOOLS_TO_INSTALL[@]} -gt 0 ]; then
            echo ""
            echo "[!] Instalando paquetes: ${TOOLS_TO_INSTALL[*]}"
            sudo apt-get update -qq && sudo apt-get install -y "${TOOLS_TO_INSTALL[@]}"
            echo "[✓] Paquetes instalados"
          fi
          
          # Instalar yq si no existe (descargable como binario)
          if ! command -v yq &>/dev/null; then
            echo "[!] Instalando yq desde GitHub releases..."
            if ! sudo curl -fsSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq || \
               ! sudo chmod +x /usr/local/bin/yq; then
              echo "[✗] ERROR: No se pudo instalar yq"
              exit 1
            fi
            echo "[✓] yq instalado exitosamente"
          fi
          
          # Ejecutar el script
          echo ""
          echo "Ejecutando generación de secreto..."
          if bash scripts/gen_argocd_secret.sh; then
            echo "[✓] Secreto sellado generado exitosamente"
            echo "secret_generated=true" >> $GITHUB_OUTPUT
          else
            echo "[✗] Error generando el secreto"
            exit 1
          fi
          
          # Verificar que el archivo se generó
          SEALED_SECRET_FILE="infra/argocd/sealed-secrets/argocd-secret.yaml"
          if [ ! -f "$SEALED_SECRET_FILE" ]; then
            echo "[✗] ERROR: El archivo de secreto no fue generado: $SEALED_SECRET_FILE"
            exit 1
          fi
          echo "[✓] Archivo generado: $SEALED_SECRET_FILE"
          
          # Validar que el YAML es válido
          if yq eval '.' "$SEALED_SECRET_FILE" > /dev/null 2>&1; then
            echo "[✓] Formato YAML válido"
          else
            echo "[✗] ERROR: El archivo YAML no es válido"
            yq eval '.' "$SEALED_SECRET_FILE"
            exit 1
          fi
          
          # Validar estructura del SealedSecret
          if ! yq eval '.apiVersion' "$SEALED_SECRET_FILE" 2>/dev/null | grep -q "bitnami.com"; then
            echo "[✗] ERROR: apiVersion no es válida para SealedSecret"
            echo "Contenido del archivo:"
            cat "$SEALED_SECRET_FILE"
            exit 1
          fi
          echo "[✓] apiVersion válido"
          
          if ! yq eval '.kind' "$SEALED_SECRET_FILE" 2>/dev/null | grep -q "SealedSecret"; then
            echo "[✗] ERROR: kind debe ser SealedSecret"
            echo "Kind encontrado: $(yq eval '.kind' "$SEALED_SECRET_FILE")"
            exit 1
          fi
          echo "[✓] kind válido: SealedSecret"
          
          echo "[✓] Estructura de SealedSecret validada"
          echo "[✓] Secreto listo para aplicar"
          
          echo "::endgroup::"
      
      - name: Verify Certificate Status
        if: always()
        run: |
          echo "::group::Verificando estado del certificado"
          
          CERT_PATH="infra/sealed-secrets/pub-cert.pem"
          
          if [ -f "$CERT_PATH" ]; then
            echo "✓ Certificado disponible en: $CERT_PATH"
            echo ""
            
            # Verificar si es auto-firmado (temporal)
            if openssl x509 -in "$CERT_PATH" -noout -subject 2>/dev/null | grep -q "sealed-secrets-temp"; then
              echo "⚠️  INFORMACIÓN: Usando certificado auto-firmado TEMPORAL"
              echo ""
              echo "Razón: Sealed-Secrets no está instalado en el cluster o no es accesible"
              echo ""
              echo "📋 Próximos pasos:"
              echo "  1. Ejecutar 'bootstrap-cluster.yml' para instalar sealed-secrets"
              echo "  2. Una vez instalado, re-ejecutar bootstrap-argocd.yaml con:"
              echo "     • fetch_cert = true"
              echo "     Para obtener el certificado del cluster y actualizar el secreto"
              echo ""
              echo "⚠️  Mientras tanto, el secreto está sellado con certificado temporal"
            else
              # Obtener información del certificado
              ISSUER=$(openssl x509 -in "$CERT_PATH" -noout -issuer 2>/dev/null | cut -d' ' -f2-)
              SUBJECT=$(openssl x509 -in "$CERT_PATH" -noout -subject 2>/dev/null | cut -d' ' -f2-)
              EXPIRY=$(openssl x509 -in "$CERT_PATH" -noout -enddate 2>/dev/null | cut -d'=' -f2)
              
              echo "✓ Certificado válido (desde cluster)"
              echo "  • Issuer: $ISSUER"
              echo "  • Subject: $SUBJECT"
              echo "  • Expira: $EXPIRY"
            fi
          else
            echo "⚠️  Certificado no encontrado"
          fi
          
          echo "::endgroup::"

      - name: Execute Bootstrap ArgoCD
        id: bootstrap-argocd
        run: |
          echo "::group::Ejecutando bootstrap de ArgoCD"
          
          export KUBECONFIG
          
          if bash infra/bootstrap/bootstrap_argocd.sh; then
            echo "exit_code=0" >> $GITHUB_OUTPUT
            echo "[✓] Bootstrap de ArgoCD completado exitosamente"
          else
            echo "exit_code=1" >> $GITHUB_OUTPUT
            echo "[✗] Bootstrap de ArgoCD falló"
            exit 1
          fi
          
          echo "::endgroup::"

      - name: Verify ArgoCD Installation
        if: success()
        timeout-minutes: 5
        run: |
          echo "::group::Verificando instalación de ArgoCD"
          
          export KUBECONFIG
          
          # Verificar que el namespace existe
          if kubectl get namespace argocd &>/dev/null; then
            echo "[✓] Namespace 'argocd' existe"
          else
            echo "[✗] Namespace 'argocd' no encontrado"
            exit 1
          fi
          
          # Verificar Helm release
          if helm list -n argocd | grep -q "^argocd"; then
            echo "[✓] Release Helm 'argocd' instalado"
            helm status argocd -n argocd 2>/dev/null || echo "[i] Status: en transición"
          else
            echo "[✗] Release Helm 'argocd' no encontrado"
            exit 1
          fi
          
          # Verificar pods con timeout
          echo ""
          echo "Estado de los pods de ArgoCD (timeout 60s):"
          timeout 60 kubectl get pods -n argocd || echo "[!] Timeout esperando pods"
          
          echo ""
          echo "[✓] Verificación completada"
          
          echo "::endgroup::"

      - name: Apply Sealed Secret
        if: success() && steps.generate-secret.outputs.secret_generated == 'true'
        timeout-minutes: 5
        run: |
          echo "::group::⚙️ Aplicando secreto sellado de ArgoCD"
          
          export KUBECONFIG
          
          SEALED_SECRET_FILE="infra/argocd/sealed-secrets/argocd-secret.yaml"
          SHOULD_APPLY="${{ inputs.apply_sealed_secret }}"
          
          if [ "$SHOULD_APPLY" != "true" ]; then
            echo "ℹ️  apply_sealed_secret está DESHABILITADO"
            echo ""
            echo "Secreto generado pero NO será aplicado al cluster."
            echo ""
            echo "📝 El secreto está listo en:"
            echo "   • Repositorio: infra/argocd/sealed-secrets/argocd-secret.yaml"
            echo "   • Puedes aplicarlo manualmente después con: kubectl apply -f ..."
            echo ""
            echo "⚙️  Para aplicar automáticamente después: marca apply_sealed_secret=true"
            echo "::endgroup::"
            exit 0
          fi
          
          echo "ℹ️  apply_sealed_secret está HABILITADO - aplicando al cluster..."
          echo ""
          
          if [ -f "$SEALED_SECRET_FILE" ]; then
            echo "[✓] Archivo de secreto sellado encontrado: $SEALED_SECRET_FILE"
            echo ""
            
            # Verificar que sealed-secrets controller esté completamente operativo
            echo "Verificando que sealed-secrets está operativo..."
            SEALED_SECRETS_READY=false
            SEALED_RETRY=0
            MAX_SEALED_RETRIES=20
            
            while [ $SEALED_RETRY -lt $MAX_SEALED_RETRIES ]; do
              SEALED_PODS=$(kubectl get pods -n kube-system -l app.kubernetes.io/name=sealed-secrets --no-headers 2>/dev/null || echo "")
              
              if echo "$SEALED_PODS" | grep -q "Running"; then
                # Verificar que el pod realmente esté ready
                if kubectl get pods -n kube-system -l app.kubernetes.io/name=sealed-secrets -o jsonpath='{.items[*].status.conditions[?(@.type=="Ready")].status}' 2>/dev/null | grep -q "True"; then
                  echo "[✓] sealed-secrets controller está operativo"
                  SEALED_SECRETS_READY=true
                  break
                fi
              fi
              
              SEALED_RETRY=$((SEALED_RETRY + 1))
              if [ $SEALED_RETRY -lt $MAX_SEALED_RETRIES ]; then
                echo "  Intento $SEALED_RETRY/$MAX_SEALED_RETRIES esperando sealed-secrets..."
                sleep 2
              fi
            done
            
            if [ "$SEALED_SECRETS_READY" != "true" ]; then
              echo "[!] ADVERTENCIA: sealed-secrets no está operativo"
              echo "    Los secretos sellados podrían no desellarse correctamente"
              echo "    Verifica el estado:"
              echo "      kubectl get pods -n kube-system -l app.kubernetes.io/name=sealed-secrets"
              echo "      kubectl logs -n kube-system -l app.kubernetes.io/name=sealed-secrets --tail=50"
            fi
            
            # IMPORTANTE: Eliminar el Secret anterior si existe (creado por Helm)
            # Esto permite que SealedSecret lo recree correctamente
            echo ""
            echo "Eliminando Secret anterior si existe (para que SealedSecret pueda recrearlo)..."
            if kubectl get secret argocd-secret -n argocd &>/dev/null; then
              echo "  [!] Secret encontrado, eliminando..."
              timeout 10 kubectl delete secret argocd-secret -n argocd --wait=true 2>/dev/null || echo "  [i] Secret ya no existe o timeout"
              sleep 1
            else
              echo "  [i] No hay Secret previo"
            fi
            
            echo ""
            echo "Aplicando secreto sellado..."
            if timeout 30 kubectl apply -f "$SEALED_SECRET_FILE"; then
              echo "[✓] SealedSecret aplicado exitosamente"
            else
              echo "[✗] Error aplicando el secreto sellado"
              exit 1
            fi
            
            # Esperar a que el secreto sea desellado
            echo ""
            echo "Esperando a que sealed-secrets deseselle el secreto (máx 60 segundos)..."
            
            RETRY_COUNT=0
            MAX_RETRIES=60
            UNSEALED_SUCCESS=false
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if timeout 5 kubectl get secret argocd-secret -n argocd &>/dev/null; then
                # Verificar que el Secret tenga datos
                if kubectl get secret argocd-secret -n argocd -o jsonpath='{.data.password}' 2>/dev/null | grep -q .; then
                  echo "[✓] Secreto desellado exitosamente"
                  UNSEALED_SUCCESS=true
                  break
                fi
              fi
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                if [ $((RETRY_COUNT % 5)) -eq 0 ]; then
                  echo "  Intento $RETRY_COUNT/$MAX_RETRIES..."
                fi
                sleep 1
              fi
            done
            
            if [ "$UNSEALED_SUCCESS" != "true" ]; then
              echo ""
              echo "[✗] El secreto no fue desellado dentro del tiempo límite (60 segundos)"
              echo ""
              echo "📋 Diagnosticando problema..."
              echo ""
              echo "Estado del SealedSecret:"
              timeout 10 kubectl describe sealedsecret argocd-secret -n argocd 2>/dev/null || echo "[!] No se pudo obtener describe"
              echo ""
              echo "Logs del sealed-secrets controller (últimas 30 líneas):"
              timeout 10 kubectl logs -n kube-system -l app.kubernetes.io/name=sealed-secrets --tail=30 2>/dev/null || echo "[!] No se pudo obtener logs"
              echo ""
              echo "Estado de pods sealed-secrets:"
              timeout 10 kubectl get pods -n kube-system -l app.kubernetes.io/name=sealed-secrets -o wide 2>/dev/null || echo "[!] No se pudo obtener pods"
              echo ""
              echo "⚠️  OPCIONES:"
              echo "  1. Esperar un poco más y re-ejecutar el workflow"
              echo "  2. Verificar que sealed-secrets está completamente operativo:"
              echo "     kubectl get deployment -n kube-system sealed-secrets-controller"
              echo "  3. Verificar logs:"
              echo "     kubectl logs -n kube-system -l app.kubernetes.io/name=sealed-secrets -f"
              echo "  4. Aplicar el secreto manualmente después:"
              echo "     kubectl apply -f infra/argocd/sealed-secrets/argocd-secret.yaml"
              echo ""
              exit 1
            fi
            
            # Reiniciar los pods de ArgoCD para que usen el nuevo secreto
            echo ""
            echo "Recargando los pods de ArgoCD para usar el nuevo secreto..."
            
            DEPLOYMENTS=(
              "argocd-server"
              "argocd-application-controller"
              "argocd-repo-server"
              "argocd-applicationset-controller"
              "argocd-notifications-controller"
            )
            
            for deployment in "${DEPLOYMENTS[@]}"; do
              if timeout 5 kubectl get deployment "$deployment" -n argocd &>/dev/null; then
                echo "  • Recargando $deployment..."
                timeout 30 kubectl rollout restart deployment/"$deployment" -n argocd || echo "[!] Timeout en rollout $deployment"
              fi
            done
            
            echo ""
            echo "[✓] Pods de ArgoCD recargados (proceso asincrónico)"
            echo ""
            echo "Estado actual de los pods:"
            timeout 30 kubectl get pods -n argocd -l app.kubernetes.io/instance=argocd 2>/dev/null || echo "[i] Esperando pods listos..."
            
          else
            echo "[!] Archivo de secreto sellado NO encontrado: $SEALED_SECRET_FILE"
            echo ""
            echo "Esto es normal en la primera ejecución."
            echo "Pasos para aplicar el secreto:"
            echo "  1. Ejecuta el workflow 'gen-argocd-secret.yaml'"
            echo "  2. Esto generará y sellará la contraseña de admin"
            echo "  3. El secreto se committeará a Git"
            echo "  4. En la siguiente ejecución de este workflow se aplicará automáticamente"
            echo ""
            echo "Por ahora, ArgoCD usa la contraseña por defecto."
          fi
          
          echo "::endgroup::"

      - name: Push Generated Changes
        if: success()
        run: |
          echo "::group::Pushing generated changes"
          
          # Verificar si hay cambios no pusheados
          if git status --porcelain | grep -q "infra/argocd/sealed-secrets"; then
            echo "[i] Cambios detectados en secreto sellado"
            
            # Configurar git
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            # Hacer add, commit y push
            git add infra/argocd/sealed-secrets/argocd-secret.yaml
            git commit -m "chore: update ArgoCD sealed secret (from bootstrap workflow)" || echo "[!] Sin cambios nuevos para commit"
            git push origin $(git rev-parse --abbrev-ref HEAD)
            
            echo "[✓] Cambios pusheados exitosamente"
          else
            echo "[i] Sin cambios para pushear"
          fi
          
          echo "::endgroup::"

      - name: Generate Bootstrap Report
        if: always()
        run: |
          echo "::group::Generando reporte de bootstrap"
          
          report_file="$ARTIFACT_DIR/bootstrap-argocd-report.txt"
          
          {
            echo "╔════════════════════════════════════════════════════════╗"
            echo "║         REPORTE DE BOOTSTRAP ARGOCD                   ║"
            echo "╚════════════════════════════════════════════════════════╝"
            echo ""
            echo "Fecha: $(date)"
            echo "Timestamp: $(date +%s)"
            echo ""
            
            if [ "${{ steps.bootstrap-argocd.outputs.exit_code }}" -eq 0 ]; then
              echo "Estado: ✓ EXITOSO"
            else
              echo "Estado: ✗ FALLÓ"
            fi
            
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Información de ArgoCD:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            
            export KUBECONFIG
            if command -v kubectl &>/dev/null && [ -f "$KUBECONFIG" ]; then
              echo "Namespace: argocd"
              echo ""
              echo "Releases Helm:"
              helm list -n argocd 2>/dev/null || echo "N/A"
              echo ""
              echo "Pods:"
              kubectl get pods -n argocd 2>/dev/null || echo "N/A"
              echo ""
              echo "Servicios:"
              kubectl get svc -n argocd 2>/dev/null || echo "N/A"
              echo ""
              echo "Secrets:"
              kubectl get secrets -n argocd 2>/dev/null || echo "N/A"
            else
              echo "No se pudo obtener información del cluster (kubectl no disponible)"
            fi
            
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Próximos pasos:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "1. Acceder a ArgoCD:"
            echo "   kubectl port-forward svc/argocd-server -n argocd 8080:443"
            echo ""
            echo "2. Obtener la contraseña de admin:"
            echo "   kubectl -n argocd get secret argocd-secret -o jsonpath=\"{.data.admin\.password}\" | base64 -d"
            echo ""
            echo "3. Abrir en navegador:"
            echo "   https://argocd.local:8080"
            echo ""
            
          } > "$report_file"
          
          cat "$report_file"
          echo "::endgroup::"

      - name: Upload Bootstrap Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-argocd-report
          path: ${{ env.ARTIFACT_DIR }}/bootstrap-argocd-report.txt
          retention-days: 30
          compression-level: 9

      - name: Cleanup on Failure
        if: failure()
        run: |
          echo "::group::Información de debugging"
          echo "[!] Bootstrap de ArgoCD falló"
          echo ""
          echo "Revisa los logs anteriores para detalles del error"
          echo ""
          echo "Para debugging, puedes ejecutar localmente:"
          echo "  export KUBECONFIG=<ruta-a-kubeconfig>"
          echo "  bash infra/bootstrap/bootstrap_argocd.sh"
          echo "::endgroup::"

      - name: Success Summary
        if: success()
        run: |
          echo "::group::Resumen de éxito"
          echo ""
          echo "✓ Bootstrap de ArgoCD completado exitosamente"
          echo ""
          echo "Información útil:"
          echo "  - Reporte disponible en artifacts: bootstrap-argocd-report"
          echo "  - Namespace: argocd"
          echo "  - Domain: argocd.local"
          echo ""
          echo "Para acceder a ArgoCD:"
          echo "  1. Port-forward: kubectl port-forward svc/argocd-server -n argocd 8080:443"
          echo "  2. Abre: https://localhost:8080"
          echo "  3. Usuario: admin"
          echo "  4. Contraseña: (desde el secret argocd-secret)"
          echo ""
          echo "::endgroup::"
