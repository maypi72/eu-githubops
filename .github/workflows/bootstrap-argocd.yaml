name: Bootstrap ArgoCD

# Este workflow configura ArgoCD en el cluster Kubernetes
# REQUISITO: Debe existir el GitHub Secret ARGOCD_ADMIN_PASSWORD
# Crear en: Settings > Secrets and variables > Actions > New repository secret
on:
  workflow_dispatch:
    inputs:
      apply_sealed_secret:
        description: 'Aplicar el secreto sellado después de instalar ArgoCD'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write
  actions: read

env:
  KUBECONFIG: $HOME/kubeconfig
  RETRY_MAX: 5
  RETRY_DELAY: 2
  ARTIFACT_DIR: $HOME/bootstrap-artifacts

jobs:
  bootstrap-argocd:
    name: Bootstrap ArgoCD
    runs-on: [self-hosted, linux]
    timeout-minutes: 15
    environment: lab

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download kubeconfig artifact (optional)
        id: download-artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: kubeconfig
          path: ${{ runner.temp }}/kubeconfig-artifact

      - name: Setup kubeconfig
        run: |
          echo "::group::Configurando kubeconfig"
          
          KUBECONFIG_FOUND=false
          
          # Buscar kubeconfig en rutas locales primero (desde bootstrap-cluster.yml)
          KUBECONFIG_PATHS=(
            "$KUBECONFIG"
            "/etc/rancher/k3s/k3s.yaml"
            "$HOME/kubeconfig"
            "$HOME/.kube/config"
          )
          
          echo "Buscando KUBECONFIG en rutas locales..."
          for kb_path in "${KUBECONFIG_PATHS[@]}"; do
            if [ -f "$kb_path" ]; then
              echo "[✓] KUBECONFIG encontrado localmente: $kb_path"
              
              # Asegurar que KUBECONFIG apunta al archivo correcto
              export KUBECONFIG="$kb_path"
              echo "KUBECONFIG=$KUBECONFIG" >> $GITHUB_ENV
              
              KUBECONFIG_FOUND=true
              break
            fi
          done
          
          # Si no se encuentra localmente, intentar usar artefacto descargado
          if [ "$KUBECONFIG_FOUND" = false ]; then
            echo "[!] KUBECONFIG no encontrado localmente"
            
            if [ "${{ steps.download-artifact.outcome }}" = "success" ] && [ -f "${{ runner.temp }}/kubeconfig-artifact/kubeconfig" ]; then
              echo "[✓] Usando artefacto descargado de bootstrap-cluster"
              cp "${{ runner.temp }}/kubeconfig-artifact/kubeconfig" "$KUBECONFIG"
              chmod 600 "$KUBECONFIG"
              echo "KUBECONFIG=$KUBECONFIG" >> $GITHUB_ENV
              echo "[✓] KUBECONFIG configurado desde artefacto: $KUBECONFIG"
              KUBECONFIG_FOUND=true
            else
              echo "[✗] Artefacto no disponible (expirado o no existe)"
              echo ""
              echo "Por favor:"
              echo "  1. Ejecuta el workflow 'bootstrap-cluster.yml' para generar nuevo artefacto"
              echo "  2. O asegúrate que k3s está instalado en /etc/rancher/k3s/k3s.yaml"
              echo "  3. O define KUBECONFIG en \$HOME/kubeconfig"
              exit 1
            fi
          fi
          
          # Verificar que KUBECONFIG es accesible
          if [ -f "$KUBECONFIG" ]; then
            echo "[✓] KUBECONFIG validado: $(ls -lh $KUBECONFIG | awk '{print $5, $9}')"
            echo "[✓] Conectando al cluster..."
            if kubectl cluster-info &>/dev/null; then
              echo "[✓] Conexión al cluster OK"
            else
              echo "[✗] No se puede conectar al cluster"
              exit 1
            fi
          else
            echo "[✗] ERROR: KUBECONFIG no es accesible en $KUBECONFIG"
            exit 1
          fi
          
          echo "::endgroup::"

      - name: Prepare Bootstrap Environment
        run: |
          echo "::group::Preparando entorno de bootstrap"
          
          # Crear directorio de artefactos
          mkdir -p $ARTIFACT_DIR
          
          # Validar scripts de bootstrap
          required_files=(
            "infra/bootstrap/bootstrap_argocd.sh"
          )
          
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "[✓] $file encontrado"
              if [ ! -x "$file" ]; then
                chmod +x "$file"
                echo "  [✓] Permisos ejecutables otorgados"
              fi
            else
              echo "[✗] ERROR: $file no encontrado"
              exit 1
            fi
          done
          
          echo "[✓] Archivos validados"
          
          echo "::endgroup::"

      - name: System Information
        run: |
          echo "::group::Información del sistema"
          echo "OS: $(uname -s)"
          echo "Kernel: $(uname -r)"
          echo "Arquitectura: $(uname -m)"
          echo "::endgroup::"

      - name: Check Prerequisites
        run: |
          echo "::group::Verificación de herramientas"
          
          tools=("kubectl" "helm")
          for tool in "${tools[@]}"; do
            if command -v "$tool" >/dev/null 2>&1; then
              version=$($tool version --short 2>&1 | head -1 || $tool --version 2>&1 | head -1)
              echo "[✓] $tool: $version"
            else
              echo "[✗] ERROR: $tool no está instalado"
              exit 1
            fi
          done
          
          echo "::endgroup::"

      - name: Verify Dependencies for Secret Generation
        run: |
          echo "::group::Verificando dependencias para generación de secreto"
          
          tools=("htpasswd" "yq" "kubeseal")
          for tool in "${tools[@]}"; do
            if command -v "$tool" >/dev/null 2>&1; then
              version=$($tool --version 2>&1 | head -1 || echo "instalado")
              echo "[✓] $tool: $version"
            else
              echo "[!] $tool no está instalado (se instalará durante el proceso)"
            fi
          done
          
          echo "::endgroup::"

      - name: Generate ArgoCD Sealed Secret
        id: generate-secret
        env:
          ARGOCD_ADMIN_PASSWORD: ${{ secrets.ARGOCD_ADMIN_PASSWORD }}
        run: |
          echo "::group::Generando secreto sellado de ArgoCD"
          
          # Verificar que la contraseña está configurada
          if [ -z "$ARGOCD_ADMIN_PASSWORD" ]; then
            echo "[✗] ERROR: ARGOCD_ADMIN_PASSWORD no está definida en GitHub Secrets"
            echo "    Agrega el secret en: Settings > Secrets and variables > Actions"
            exit 1
          fi
          echo "[✓] ARGOCD_ADMIN_PASSWORD está configurada"
          
          # Verificar que el script existe
          if [ ! -f "scripts/gen_argocd_secret.sh" ]; then
            echo "[✗] ERROR: scripts/gen_argocd_secret.sh no encontrado"
            exit 1
          fi
          echo "[✓] Script de generación encontrado"
          
          # Hacer el script ejecutable
          chmod +x scripts/gen_argocd_secret.sh
          echo "[✓] Permisos ejecutables otorgados"
          
          # Ejecutar el script
          echo ""
          echo "Ejecutando generación de secreto..."
          if bash scripts/gen_argocd_secret.sh; then
            echo "[✓] Secreto sellado generado exitosamente"
            echo "secret_generated=true" >> $GITHUB_OUTPUT
          else
            echo "[✗] Error generando el secreto"
            exit 1
          fi
          
          # Verificar que el archivo se generó
          SEALED_SECRET_FILE="infra/argocd/sealed-secrets/argocd-secret.yaml"
          if [ ! -f "$SEALED_SECRET_FILE" ]; then
            echo "[✗] ERROR: El archivo de secreto no fue generado: $SEALED_SECRET_FILE"
            exit 1
          fi
          echo "[✓] Archivo generado: $SEALED_SECRET_FILE"
          
          # Validar que el YAML es válido
          if yq eval '.' "$SEALED_SECRET_FILE" > /dev/null 2>&1; then
            echo "[✓] Formato YAML válido"
          else
            echo "[✗] ERROR: El archivo YAML no es válido"
            yq eval '.' "$SEALED_SECRET_FILE"
            exit 1
          fi
          
          # Validar estructura del SealedSecret
          if ! yq eval '.apiVersion' "$SEALED_SECRET_FILE" | grep -q "bitnami.com"; then
            echo "[✗] ERROR: apiVersion no es válida para SealedSecret"
            exit 1
          fi
          
          if ! yq eval '.kind' "$SEALED_SECRET_FILE" | grep -q "SealedSecret"; then
            echo "[✗] ERROR: kind debe ser SealedSecret"
            exit 1
          fi
          
          echo "[✓] Estructura de SealedSecret validada"
          echo "[✓] Secreto listo para aplicar"
          
          echo "::endgroup::"

      - name: Execute Bootstrap ArgoCD
        id: bootstrap-argocd
        run: |
          echo "::group::Ejecutando bootstrap de ArgoCD"
          
          export KUBECONFIG
          
          if bash infra/bootstrap/bootstrap_argocd.sh; then
            echo "exit_code=0" >> $GITHUB_OUTPUT
            echo "[✓] Bootstrap de ArgoCD completado exitosamente"
          else
            echo "exit_code=1" >> $GITHUB_OUTPUT
            echo "[✗] Bootstrap de ArgoCD falló"
            exit 1
          fi
          
          echo "::endgroup::"

      - name: Verify ArgoCD Installation
        if: success()
        timeout-minutes: 5
        run: |
          echo "::group::Verificando instalación de ArgoCD"
          
          export KUBECONFIG
          
          # Verificar que el namespace existe
          if kubectl get namespace argocd &>/dev/null; then
            echo "[✓] Namespace 'argocd' existe"
          else
            echo "[✗] Namespace 'argocd' no encontrado"
            exit 1
          fi
          
          # Verificar Helm release
          if helm list -n argocd | grep -q "^argocd"; then
            echo "[✓] Release Helm 'argocd' instalado"
            helm status argocd -n argocd 2>/dev/null || echo "[i] Status: en transición"
          else
            echo "[✗] Release Helm 'argocd' no encontrado"
            exit 1
          fi
          
          # Verificar pods con timeout
          echo ""
          echo "Estado de los pods de ArgoCD (timeout 60s):"
          timeout 60 kubectl get pods -n argocd || echo "[!] Timeout esperando pods"
          
          echo ""
          echo "[✓] Verificación completada"
          
          echo "::endgroup::"

      - name: Apply Sealed Secret
        if: success() && steps.generate-secret.outputs.secret_generated == 'true'
        timeout-minutes: 5
        run: |
          echo "::group::Aplicando secreto sellado de ArgoCD"
          
          export KUBECONFIG
          
          SEALED_SECRET_FILE="infra/argocd/sealed-secrets/argocd-secret.yaml"
          SHOULD_APPLY="${{ inputs.apply_sealed_secret }}"
          
          if [ "$SHOULD_APPLY" != "false" ]; then
            echo "apply_sealed_secret está habilitado (default: true)"
          else
            echo "[!] apply_sealed_secret está deshabilitado, skipping..."
            echo "::endgroup::"
            exit 0
          fi
          
          if [ -f "$SEALED_SECRET_FILE" ]; then
            echo "[✓] Archivo de secreto sellado encontrado: $SEALED_SECRET_FILE"
            echo ""
            
            # IMPORTANTE: Eliminar el Secret anterior si existe (creado por Helm)
            # Esto permite que SealedSecret lo recree correctamente
            echo "Eliminando Secret anterior si existe (para que SealedSecret pueda recrearlo)..."
            if kubectl get secret argocd-secret -n argocd &>/dev/null; then
              echo "  [!] Secret encontrado, eliminando..."
              timeout 10 kubectl delete secret argocd-secret -n argocd --wait=true 2>/dev/null || echo "  [i] Secret ya no existe o timeout"
              sleep 2
            else
              echo "  [i] No hay Secret previo"
            fi
            
            # Verificar que sealed-secrets controller esté running
            if ! timeout 10 kubectl get pods -n kube-system -l app.kubernetes.io/name=sealed-secrets --no-headers 2>/dev/null | grep -q "Running"; then
              echo "[!] Advertencia: sealed-secrets controller no está running"
              echo "    El secreto sellado podría no desellarse correctamente"
            fi
            
            echo "Aplicando secreto sellado..."
            if timeout 30 kubectl apply -f "$SEALED_SECRET_FILE"; then
              echo "[✓] SealedSecret aplicado exitosamente"
            else
              echo "[✗] Error aplicando el secreto sellado"
              exit 1
            fi
            
            # Esperar a que el secreto sea desellado
            echo ""
            echo "Esperando a que sealed-secrets deseselle el secreto (máx 30 segundos)..."
            
            RETRY_COUNT=0
            MAX_RETRIES=30
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if timeout 5 kubectl get secret argocd-secret -n argocd &>/dev/null; then
                echo "[✓] Secreto desellado exitosamente"
                break
              fi
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "  Intento $RETRY_COUNT/$MAX_RETRIES..."
                sleep 1
              fi
            done
            
            if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
              echo "[✗] El secreto no fue desellado dentro del tiempo límite"
              echo "    Verifica los logs del sealed-secrets controller:"
              echo "    kubectl logs -n kube-system -l app.kubernetes.io/name=sealed-secrets"
              exit 1
            fi
            
            # Reiniciar los pods de ArgoCD para que usen el nuevo secreto
            echo ""
            echo "Recargando los pods de ArgoCD para usar el nuevo secreto..."
            
            DEPLOYMENTS=(
              "argocd-server"
              "argocd-application-controller"
              "argocd-repo-server"
              "argocd-applicationset-controller"
              "argocd-notifications-controller"
            )
            
            for deployment in "${DEPLOYMENTS[@]}"; do
              if timeout 5 kubectl get deployment "$deployment" -n argocd &>/dev/null; then
                echo "  • Recargando $deployment..."
                timeout 30 kubectl rollout restart deployment/"$deployment" -n argocd || echo "[!] Timeout en rollout $deployment"
              fi
            done
            
            echo ""
            echo "[✓] Pods de ArgoCD recargados (proceso asincrónico)"
            echo ""
            echo "Estado actual de los pods:"
            timeout 30 kubectl get pods -n argocd -l app.kubernetes.io/instance=argocd 2>/dev/null || echo "[i] Esperando pods listos..."
            
          else
            echo "[!] Archivo de secreto sellado NO encontrado: $SEALED_SECRET_FILE"
            echo ""
            echo "Esto es normal en la primera ejecución."
            echo "Pasos para aplicar el secreto:"
            echo "  1. Ejecuta el workflow 'gen-argocd-secret.yaml'"
            echo "  2. Esto generará y sellará la contraseña de admin"
            echo "  3. El secreto se committeará a Git"
            echo "  4. En la siguiente ejecución de este workflow se aplicará automáticamente"
            echo ""
            echo "Por ahora, ArgoCD usa la contraseña por defecto."
          fi
          
          echo "::endgroup::"

      - name: Push Generated Changes
        if: success()
        run: |
          echo "::group::Pushing generated changes"
          
          # Verificar si hay cambios no pusheados
          if git status --porcelain | grep -q "infra/argocd/sealed-secrets"; then
            echo "[i] Cambios detectados en secreto sellado"
            
            # Configurar git
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            # Hacer add, commit y push
            git add infra/argocd/sealed-secrets/argocd-secret.yaml
            git commit -m "chore: update ArgoCD sealed secret (from bootstrap workflow)" || echo "[!] Sin cambios nuevos para commit"
            git push origin $(git rev-parse --abbrev-ref HEAD)
            
            echo "[✓] Cambios pusheados exitosamente"
          else
            echo "[i] Sin cambios para pushear"
          fi
          
          echo "::endgroup::"

      - name: Generate Bootstrap Report
        if: always()
        run: |
          echo "::group::Generando reporte de bootstrap"
          
          report_file="$ARTIFACT_DIR/bootstrap-argocd-report.txt"
          
          {
            echo "╔════════════════════════════════════════════════════════╗"
            echo "║         REPORTE DE BOOTSTRAP ARGOCD                   ║"
            echo "╚════════════════════════════════════════════════════════╝"
            echo ""
            echo "Fecha: $(date)"
            echo "Timestamp: $(date +%s)"
            echo ""
            
            if [ "${{ steps.bootstrap-argocd.outputs.exit_code }}" -eq 0 ]; then
              echo "Estado: ✓ EXITOSO"
            else
              echo "Estado: ✗ FALLÓ"
            fi
            
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Información de ArgoCD:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            
            export KUBECONFIG
            if command -v kubectl &>/dev/null && [ -f "$KUBECONFIG" ]; then
              echo "Namespace: argocd"
              echo ""
              echo "Releases Helm:"
              helm list -n argocd 2>/dev/null || echo "N/A"
              echo ""
              echo "Pods:"
              kubectl get pods -n argocd 2>/dev/null || echo "N/A"
              echo ""
              echo "Servicios:"
              kubectl get svc -n argocd 2>/dev/null || echo "N/A"
              echo ""
              echo "Secrets:"
              kubectl get secrets -n argocd 2>/dev/null || echo "N/A"
            else
              echo "No se pudo obtener información del cluster (kubectl no disponible)"
            fi
            
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Próximos pasos:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "1. Acceder a ArgoCD:"
            echo "   kubectl port-forward svc/argocd-server -n argocd 8080:443"
            echo ""
            echo "2. Obtener la contraseña de admin:"
            echo "   kubectl -n argocd get secret argocd-secret -o jsonpath=\"{.data.admin\.password}\" | base64 -d"
            echo ""
            echo "3. Abrir en navegador:"
            echo "   https://argocd.local:8080"
            echo ""
            
          } > "$report_file"
          
          cat "$report_file"
          echo "::endgroup::"

      - name: Upload Bootstrap Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-argocd-report
          path: ${{ env.ARTIFACT_DIR }}/bootstrap-argocd-report.txt
          retention-days: 30
          compression-level: 9

      - name: Cleanup on Failure
        if: failure()
        run: |
          echo "::group::Información de debugging"
          echo "[!] Bootstrap de ArgoCD falló"
          echo ""
          echo "Revisa los logs anteriores para detalles del error"
          echo ""
          echo "Para debugging, puedes ejecutar localmente:"
          echo "  export KUBECONFIG=<ruta-a-kubeconfig>"
          echo "  bash infra/bootstrap/bootstrap_argocd.sh"
          echo "::endgroup::"

      - name: Success Summary
        if: success()
        run: |
          echo "::group::Resumen de éxito"
          echo ""
          echo "✓ Bootstrap de ArgoCD completado exitosamente"
          echo ""
          echo "Información útil:"
          echo "  - Reporte disponible en artifacts: bootstrap-argocd-report"
          echo "  - Namespace: argocd"
          echo "  - Domain: argocd.local"
          echo ""
          echo "Para acceder a ArgoCD:"
          echo "  1. Port-forward: kubectl port-forward svc/argocd-server -n argocd 8080:443"
          echo "  2. Abre: https://localhost:8080"
          echo "  3. Usuario: admin"
          echo "  4. Contraseña: (desde el secret argocd-secret)"
          echo ""
          echo "::endgroup::"
