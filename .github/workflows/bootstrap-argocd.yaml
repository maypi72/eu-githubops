name: Bootstrap ArgoCD

on:
  workflow_dispatch:
    inputs:
      fetch_cert:
        description: '📥 Descargar certificado del cluster y actualizar pub-cert.pem'
        type: boolean
        default: false

      apply_sealed_secret:
        description: '⚙️ Aplicar secreto sellado al cluster'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  bootstrap-argocd:
    name: Bootstrap ArgoCD
    runs-on: [self-hosted, linux]
    timeout-minutes: 15
    environment: lab

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------------------------
      # PRECHECKS
      # -------------------------------------------------
      - name: Verify kubeconfig
        run: |
          echo "::group::Verificando kubeconfig"
          
          # Buscar kubeconfig en ubicaciones estándar
          KUBECONFIG_PATHS=(
            "/etc/rancher/k3s/k3s.yaml"
            "$HOME/kubeconfig"
            "$HOME/.kube/config"
          )
          
          KUBECONFIG_FOUND=false
          for kb_path in "${KUBECONFIG_PATHS[@]}"; do
            if [ -f "$kb_path" ] && [ -s "$kb_path" ]; then
              export KUBECONFIG="$kb_path"
              KUBECONFIG_FOUND=true
              break
            fi
          done
          
          if [ "$KUBECONFIG_FOUND" = false ]; then
            echo "[✗] KUBECONFIG no encontrado en ubicaciones estándar"
            exit 1
          fi
          
          if ! kubectl cluster-info >/dev/null 2>&1; then
            echo "[✗] No se puede conectar al cluster"
            exit 1
          fi
          
          echo "[✓] Conectado al cluster en: $KUBECONFIG"
          echo "::endgroup::"

      - name: Verify required tools
        run: |
          echo "::group::Verificando e instalando herramientas"
          
          # Función para instalar kubeseal
          install_kubeseal() {
            echo "  [i] Verificando kubeseal..."

            if command -v kubeseal >/dev/null 2>&1; then
              echo "    [✓] kubeseal ya está instalado"
              return 0
            fi

            KUBESEAL_VERSION="0.36.6"

            echo "  [i] kubeseal no encontrado, instalando..."
            echo "    Versión: $KUBESEAL_VERSION"

            ARCH=$(uname -m)
            case "$ARCH" in
              x86_64)   ARCH_DL="amd64" ;;
              aarch64)  ARCH_DL="arm64" ;;
              *) echo "    [✗] Arquitectura no soportada: $ARCH"; exit 1 ;;
            esac

            cd /tmp
            TARBALL="kubeseal-${KUBESEAL_VERSION}-linux-${ARCH_DL}.tar.gz"
            URL="https://github.com/bitnami-labs/sealed-secrets/releases/download/v${KUBESEAL_VERSION}/${TARBALL}"

            echo "    URL: $URL"

            # Descargar tar.gz
            if ! wget -q --show-progress -O "${TARBALL}" "$URL"; then
              echo "    [✗] Error descargando kubeseal"
              exit 1
            fi

            # Extraer
            if ! tar -xzf "${TARBALL}" kubeseal; then
              echo "    [✗] Error extrayendo kubeseal"
              exit 1
            fi

            # Instalar
            sudo install -m 755 kubeseal /usr/local/bin/kubeseal
            rm -f "${TARBALL}" kubeseal

            echo "    [✓] kubeseal instalado correctamente"
          }
          
          # Instalar kubeseal
          install_kubeseal
          
          # Verificar otras herramientas
          for tool in kubectl helm yq htpasswd; do
            if ! command -v "$tool" >/dev/null; then
              echo "[✗] Falta herramienta: $tool"
              exit 1
            fi
            echo "[✓] $tool"
          done
          echo "::endgroup::"

      # -------------------------------------------------
      # CERTIFICATE HANDLING
      # -------------------------------------------------
      - name: Fetch Sealed-Secrets Certificate
        if: inputs.fetch_cert
        run: |
          echo "::group::Descargando certificado sealed-secrets"
          mkdir -p infra/sealed-secrets
          kubectl get secrets -n kube-system sealed-secrets-key \
            -o jsonpath='{.data.cert\.pem}' | base64 -d \
            > infra/sealed-secrets/pub-cert.pem
          echo "[✓] Certificado actualizado"
          echo "::endgroup::"

      # -------------------------------------------------
      # SECRET GENERATION
      # -------------------------------------------------
      - name: Generate ArgoCD Sealed Secret
        id: generate-secret
        env:
          ARGOCD_ADMIN_PASSWORD: ${{ secrets.ARGOCD_ADMIN_PASSWORD }}
        run: |
          echo "::group::Generando secreto sellado"
          if [ -z "$ARGOCD_ADMIN_PASSWORD" ]; then
            echo "[✗] ARGOCD_ADMIN_PASSWORD no definido"
            exit 1
          fi

          chmod +x scripts/gen_argocd_secret.sh
          bash scripts/gen_argocd_secret.sh
          echo "generated=true" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      # -------------------------------------------------
      # BOOTSTRAP ARGOCD (PRIMERO - sin el secret nuevo)
      # -------------------------------------------------
      - name: Install / Upgrade ArgoCD
        run: |
          echo "::group::Instalando ArgoCD"
          chmod +x infra/bootstrap/bootstrap_argocd.sh
          bash infra/bootstrap/bootstrap_argocd.sh
          echo "::endgroup::"

      # -------------------------------------------------
      # WAIT FOR ARGOCD PODS
      # -------------------------------------------------
      - name: Wait for ArgoCD pods to be ready
        run: |
          echo "::group::Esperando a que los pods de ArgoCD estén listos"
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=argocd-server -n argocd --timeout=300s || true
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=argocd-application-controller -n argocd --timeout=300s || true
          echo "[✓] Pods de ArgoCD listos"
          echo "::endgroup::"

      # -------------------------------------------------
      # PRE-CONDITIONS: VALIDATE SECRET FILE
      # -------------------------------------------------
      - name: Validate sealed secret file
        if: steps.generate-secret.outputs.generated == 'true'
        run: |
          echo "::group::Pre-condición: Validando archivo del secret"
          
          SECRET_FILE="infra/argocd/sealed-secrets/argocd-secret.yaml"
          
          # Verificar que el archivo existe
          if [ ! -f "$SECRET_FILE" ]; then
            echo "[✗] ERROR: Archivo no encontrado: $SECRET_FILE"
            exit 1
          fi
          echo "[✓] Archivo existe"
          
          # Verificar que es YAML válido
          if ! yq eval '.' "$SECRET_FILE" > /dev/null 2>&1; then
            echo "[✗] ERROR: YAML inválido"
            exit 1
          fi
          echo "[✓] YAML válido"
          
          # Verificar que es un SealedSecret
          if ! yq eval '.kind' "$SECRET_FILE" 2>/dev/null | grep -q "SealedSecret"; then
            echo "[✗] ERROR: No es un SealedSecret válido"
            yq eval '.kind' "$SECRET_FILE"
            exit 1
          fi
          echo "[✓] Es un SealedSecret válido"
          
          # Verificar que tiene el namespace correcto
          if ! yq eval '.metadata.namespace' "$SECRET_FILE" 2>/dev/null | grep -q "argocd"; then
            echo "[✗] ERROR: Namespace incorrecto"
            exit 1
          fi
          echo "[✓] Namespace: argocd"
          echo "::endgroup::"

      # -------------------------------------------------
      # CLEAN UP: REMOVE EXISTING SECRET
      # -------------------------------------------------
      - name: Remove existing argocd-secret
        if: steps.generate-secret.outputs.generated == 'true'
        run: |
          echo "::group::Limpiando secret existente"
          
          # Primero eliminar el SealedSecret si existe
          if kubectl get sealedsecret argocd-secret -n argocd > /dev/null 2>&1; then
            echo "[i] SealedSecret detectado, eliminando..."
            kubectl delete sealedsecret argocd-secret -n argocd
            sleep 2
          fi
          
          # Luego eliminar el secret si existe
          if kubectl get secret argocd-secret -n argocd > /dev/null 2>&1; then
            echo "[i] Secret existente detectado, eliminando..."
            kubectl delete secret argocd-secret -n argocd
            sleep 2
            echo "[✓] Secret eliminado correctamente"
          else
            echo "[i] No hay secret existente"
          fi
          
          echo "::endgroup::"

      # -------------------------------------------------
      # PRE-CONDITIONS: VALIDATE SECRET FILE
      # -------------------------------------------------

      # -------------------------------------------------
      # APPLY NEW PASSWORD SECRET
      # -------------------------------------------------
      - name: Apply ArgoCD Admin Password Secret
        if: steps.generate-secret.outputs.generated == 'true'
        run: |
          echo "::group::Aplicando nuevo secret sellado"
          
          # Crear namespace si no existe
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          echo "[✓] Namespace garantizado"
          
          # Aplicar el nuevo secret sellado
          kubectl apply -f infra/argocd/sealed-secrets/argocd-secret.yaml
          echo "[✓] Secret aplicado"
          
          # Esperar a que el secret se sincronice y se descifre
          echo "[i] Esperando a que el secret se descifre..."
          for i in {1..30}; do
            if kubectl get secret argocd-secret -n argocd -o jsonpath='{.data.admin\.password}' 2>/dev/null | grep -q .; then
              echo "[✓] Secret desencriptado correctamente"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "[✗] ERROR: Secret no se descifró después de 30 intentos"
              exit 1
            fi
            sleep 1
          done
          
          echo "::endgroup::"

      # -------------------------------------------------
      # POST-CONDITIONS: RESTART AND VERIFY
      # -------------------------------------------------
      - name: Restart ArgoCD and verify
        if: steps.generate-secret.outputs.generated == 'true'
        run: |
          echo "::group::Post-condición: Reiniciando ArgoCD"
          
          # Reiniciar argocd-server
          kubectl rollout restart deployment/argocd-server -n argocd
          echo "[i] Reinicio iniciado"
          
          # Esperar a que esté ready
          if ! kubectl rollout status deployment/argocd-server -n argocd --timeout=300s; then
            echo "[✗] ERROR: ArgoCD no se reinició correctamente"
            kubectl logs -n argocd deployment/argocd-server --tail=50
            exit 1
          fi
          echo "[✓] ArgoCD reiniciado correctamente"
          echo "::endgroup::"

      - name: Verify password was updated
        if: steps.generate-secret.outputs.generated == 'true'
        run: |
          echo "::group::Post-condición: Verificando actualización de contraseña"
          
          # Dar un poco más de tiempo para que ArgoCD cargue el nuevo secret
          sleep 10
          
          # Verificar que el secret contiene el hash de contraseña
          PASSWORD_HASH=$(kubectl get secret argocd-secret -n argocd -o jsonpath='{.data.admin\.password}' 2>/dev/null | base64 -d)
          
          if [ -z "$PASSWORD_HASH" ]; then
            echo "[✗] ERROR: No se encontró hash de contraseña"
            exit 1
          fi
          
          if ! echo "$PASSWORD_HASH" | grep -q '^\$2a\$'; then
            echo "[✗] ERROR: Hash no es válido (no es bcrypt)"
            exit 1
          fi
          echo "[✓] Hash de contraseña válido detectado"
          
          # Verificar que el pod tiene el secret montado
          if ! kubectl get pod -n argocd -l app.kubernetes.io/name=argocd-server -o json 2>/dev/null | grep -q "argocd-secret"; then
            echo "[⚠] ADVERTENCIA: El secret podría no estar correctamente montado"
          fi
          echo "[✓] Secret está disponible en el cluster"
          
          # Verificar que no hay errores recientes en los logs
          if kubectl logs -n argocd deployment/argocd-server --tail=20 2>/dev/null | grep -i "invalid.*password\|auth.*fail" > /dev/null; then
            echo "[⚠] ADVERTENCIA: Se detectaron errores de autenticación en logs recientes"
            kubectl logs -n argocd deployment/argocd-server --tail=20
          else
            echo "[✓] No se detectan errores de autenticación en logs"
          fi
          
          echo "::endgroup::"

      # -------------------------------------------------
      # COMMIT CHANGES
      # -------------------------------------------------
      - name: Push generated files
        if: success()
        run: |
          if git status --porcelain | grep -q infra/; then
            git config user.name "gha-runner"
            git config user.email "gha-runner@users.noreply.github.com"
            git add infra/
            git commit -m "chore: update ArgoCD sealed secrets"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          fi